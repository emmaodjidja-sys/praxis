<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1A2E;--navy-mid:#122240;--navy-light:#1a3050;--teal:#2EC4B6;--amber:#E8A317;--coral:#E85D5D;--slate:#8899AA;--off-white:#E8ECF0;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--navy);color:var(--slate);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:inherit}
a{color:var(--teal);text-decoration:none}
a:hover{text-decoration:underline}

/* Topbar */
.topbar{height:44px;background:var(--navy-mid);border-bottom:1px solid rgba(46,196,182,0.15);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--off-white);font-size:14px}
.topbar-brand span{color:var(--teal)}
.topbar-tabs{display:flex;gap:2px}
.topbar-tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;color:var(--slate);transition:all .2s}
.topbar-tab:hover{color:var(--off-white);background:var(--navy-light)}
.topbar-tab.active{color:var(--teal);background:rgba(46,196,182,0.1)}
.topbar-tab .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--teal);color:var(--navy);font-size:11px;font-weight:700;margin-left:6px}
.topbar-links{display:flex;gap:12px;align-items:center;font-size:13px}
.topbar-links a{color:var(--slate)}
.topbar-links a:hover{color:var(--teal)}

/* Mobile bottom tab bar */
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--navy-mid);border-top:1px solid rgba(46,196,182,0.15);z-index:100;justify-content:space-around;align-items:center}
.mobile-tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--slate);padding:4px 12px;position:relative}
.mobile-tab.active{color:var(--teal)}
.mobile-tab svg{width:22px;height:22px}
.mobile-tab .badge{position:absolute;top:-2px;right:2px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--teal);color:var(--navy);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* Main content */
.main{max-width:1100px;margin:0 auto;padding:20px 16px 80px}

/* Search bar */
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:10px 16px 10px 40px;background:var(--navy-mid);border:1px solid rgba(46,196,182,0.2);border-radius:8px;color:var(--off-white);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--teal)}
.search-input::placeholder{color:var(--slate)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--slate);pointer-events:none}
.search-shortcut{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:11px;color:var(--slate);background:var(--navy-light);padding:2px 6px;border-radius:4px}

/* Filter panel */
.filter-toggle{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;color:var(--teal);background:rgba(46,196,182,0.08);border:1px solid rgba(46,196,182,0.2);margin-bottom:12px;transition:all .2s}
.filter-toggle:hover{background:rgba(46,196,182,0.15)}
.filter-active-count{background:var(--teal);color:var(--navy);padding:0 6px;border-radius:10px;font-size:11px;font-weight:700;margin-left:4px}
.filter-panel{background:var(--navy-mid);border:1px solid rgba(46,196,182,0.1);border-radius:10px;padding:16px;margin-bottom:16px;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.filter-section{margin-bottom:14px}
.filter-section:last-child{margin-bottom:0}
.filter-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--off-white);margin-bottom:8px}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px}
.filter-pill{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;background:var(--navy-light);color:var(--slate);border:1px solid transparent;transition:all .15s;white-space:nowrap}
.filter-pill:hover{color:var(--off-white);border-color:rgba(46,196,182,0.3)}
.filter-pill.active{background:rgba(46,196,182,0.15);color:var(--teal);border-color:var(--teal)}
.filter-pill .cnt{font-family:var(--font-mono);font-size:10px;margin-left:4px;opacity:0.7}
.filter-clear{font-size:12px;color:var(--coral);font-weight:600;padding:4px 10px}
.filter-clear:hover{text-decoration:underline}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}

/* Subsector headers */
.subsector-header{display:flex;align-items:center;gap:10px;margin:20px 0 10px;color:var(--off-white);font-size:13px;font-weight:600}
.subsector-header::before,.subsector-header::after{content:'';flex:1;height:1px;background:rgba(136,153,170,0.2)}
.subsector-header .sub-count{font-family:var(--font-mono);font-weight:400;color:var(--slate);font-size:11px}

/* Indicator cards */
.indicator-row{background:var(--navy-mid);border:1px solid rgba(46,196,182,0.08);border-radius:8px;margin-bottom:6px;transition:all .15s;overflow:hidden}
.indicator-row:nth-child(even){background:rgba(18,34,64,0.7)}
.indicator-row:hover{border-color:rgba(46,196,182,0.2)}
.indicator-summary{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.indicator-summary:hover{background:rgba(46,196,182,0.03)}
.id-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;min-width:52px;text-align:center}
.level-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;text-transform:uppercase;letter-spacing:0.3px}
.indicator-name{flex:1;font-size:13px;color:var(--off-white);font-weight:500;line-height:1.4}
.subsector-tag{font-size:11px;color:var(--slate);background:var(--navy-light);padding:2px 8px;border-radius:10px;white-space:nowrap;display:none}
.rec-badge{font-size:10px;font-weight:700;color:var(--amber);background:rgba(232,163,23,0.12);padding:2px 8px;border-radius:10px;white-space:nowrap}
.expand-arrow{color:var(--slate);transition:transform .2s;flex-shrink:0}
.expand-arrow.open{transform:rotate(180deg)}
.indicator-detail{padding:0 14px 14px}
.detail-section{margin-bottom:12px}
.detail-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--slate);margin-bottom:4px}
.detail-text{font-size:13px;color:var(--off-white);line-height:1.5}
.num-den-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.num-box,.den-box{padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.4}
.num-box{background:rgba(46,196,182,0.08);border:1px solid rgba(46,196,182,0.15)}
.num-box .detail-label{color:var(--teal)}
.den-box{background:rgba(232,163,23,0.08);border:1px solid rgba(232,163,23,0.15)}
.den-box .detail-label{color:var(--amber)}
.meta-row{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--slate)}
.meta-item{display:flex;align-items:center;gap:4px}
.meta-item strong{color:var(--off-white);font-weight:600}
.instruments-panel{background:rgba(91,185,140,0.06);border:1px solid rgba(91,185,140,0.15);border-radius:6px;padding:10px 12px}
.instruments-panel .detail-label{color:#5BB98C}
.instrument-line{font-size:12px;color:var(--off-white);padding:2px 0;line-height:1.4}
.tag-row{display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--navy-light);color:var(--slate);border:1px solid rgba(136,153,170,0.15)}
.tag-pill.fw{background:rgba(46,196,182,0.08);color:var(--teal);border-color:rgba(46,196,182,0.2)}
.tag-pill.src{background:rgba(232,163,23,0.08);color:var(--amber);border-color:rgba(232,163,23,0.2)}
.tag-pill.dis{background:rgba(155,109,215,0.08);color:#9B6DD7;border-color:rgba(155,109,215,0.2)}
.practitioner-note{border-left:3px solid var(--teal);padding:10px 12px;background:rgba(46,196,182,0.04);border-radius:0 6px 6px 0;font-size:12px;color:var(--off-white);line-height:1.5}
.card-actions{display:flex;gap:8px;margin-top:12px}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-teal{background:var(--teal);color:var(--navy)}
.btn-teal:hover{background:#25b0a3}
.btn-outline{border:1px solid rgba(46,196,182,0.3);color:var(--teal)}
.btn-outline:hover{background:rgba(46,196,182,0.1)}
.btn-coral{background:rgba(232,93,93,0.15);color:var(--coral);border:1px solid rgba(232,93,93,0.2)}
.btn-coral:hover{background:rgba(232,93,93,0.25)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;padding:12px 0}
.page-btn{padding:6px 12px;border-radius:6px;font-size:13px;font-weight:600;color:var(--slate);background:var(--navy-mid);border:1px solid rgba(46,196,182,0.1)}
.page-btn:hover{border-color:var(--teal);color:var(--teal)}
.page-btn.active{background:var(--teal);color:var(--navy);border-color:var(--teal)}
.page-info{font-size:12px;color:var(--slate)}
.results-count{font-size:13px;color:var(--slate);margin-bottom:12px}
.results-count strong{color:var(--off-white)}

/* Wizard */
.wizard-progress{display:flex;gap:0;margin-bottom:24px;background:var(--navy-mid);border-radius:8px;overflow:hidden}
.wizard-step-indicator{flex:1;padding:10px 16px;font-size:12px;font-weight:600;color:var(--slate);text-align:center;position:relative;transition:all .2s}
.wizard-step-indicator.active{color:var(--teal);background:rgba(46,196,182,0.08)}
.wizard-step-indicator.done{color:var(--off-white);background:rgba(46,196,182,0.04)}
.wizard-step-indicator .step-num{font-family:var(--font-mono);margin-right:4px}
.sector-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.sector-card{padding:14px;border-radius:8px;background:var(--navy-mid);border:2px solid transparent;cursor:pointer;transition:all .15s}
.sector-card:hover{border-color:rgba(46,196,182,0.3)}
.sector-card.selected{border-color:var(--teal);background:rgba(46,196,182,0.06)}
.sector-card-name{font-size:14px;font-weight:600;color:var(--off-white);margin-bottom:4px}
.sector-card-count{font-family:var(--font-mono);font-size:12px;color:var(--slate)}
.eval-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.eval-card{padding:14px;border-radius:8px;background:var(--navy-mid);border:2px solid transparent;cursor:pointer;transition:all .15s}
.eval-card:hover{border-color:rgba(46,196,182,0.3)}
.eval-card.selected{border-color:var(--teal);background:rgba(46,196,182,0.06)}
.eval-card-name{font-size:14px;font-weight:600;color:var(--off-white);margin-bottom:4px}
.eval-card-desc{font-size:12px;color:var(--slate);line-height:1.4}
.wizard-nav{display:flex;justify-content:space-between;margin-top:24px}
.wizard-results{margin-top:16px}
.wizard-level-group{margin-bottom:16px}
.wizard-level-title{font-size:14px;font-weight:700;color:var(--off-white);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wizard-add-all{font-size:12px;color:var(--teal);font-weight:600;margin-left:auto}

/* Framework view */
.fw-section{margin-bottom:24px}
.fw-section-title{font-size:16px;font-weight:700;color:var(--off-white);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fw-editable{width:100%;padding:10px 14px;background:var(--navy-mid);border:1px solid rgba(46,196,182,0.15);border-radius:6px;color:var(--off-white);font-size:14px;resize:vertical;min-height:40px;outline:none;transition:border-color .2s}
.fw-editable:focus{border-color:var(--teal)}
.fw-editable::placeholder{color:var(--slate)}
.fw-table-wrap{overflow-x:auto;margin-top:10px}
.fw-table{width:100%;border-collapse:collapse;font-size:12px}
.fw-table th{text-align:left;padding:8px 10px;background:var(--navy-light);color:var(--off-white);font-weight:600;white-space:nowrap;border-bottom:2px solid rgba(46,196,182,0.2)}
.fw-table td{padding:6px 10px;border-bottom:1px solid rgba(136,153,170,0.1);color:var(--off-white);vertical-align:top}
.fw-table tr:hover{background:rgba(46,196,182,0.03)}
.fw-table .drag-handle{cursor:grab;color:var(--slate);padding:0 4px;user-select:none}
.fw-table .drag-handle:active{cursor:grabbing}
.fw-table input{background:var(--navy);border:1px solid rgba(46,196,182,0.15);border-radius:4px;padding:4px 8px;color:var(--off-white);font-size:12px;width:80px;outline:none;font-family:var(--font-mono)}
.fw-table input:focus{border-color:var(--teal)}
.fw-table tr.drag-over{border-top:2px solid var(--teal)}
.fw-empty{text-align:center;padding:40px 20px;color:var(--slate)}
.fw-empty-title{font-size:18px;font-weight:700;color:var(--off-white);margin-bottom:8px}
.fw-empty-text{font-size:14px;line-height:1.5;max-width:500px;margin:0 auto}
.export-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid rgba(136,153,170,0.15)}
.level-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Level-specific colors */
.level-impact{background:var(--coral);color:#fff}
.level-outcome{background:var(--teal);color:var(--navy)}
.level-output{background:var(--amber);color:var(--navy)}
.level-process{background:var(--slate);color:var(--navy)}

/* Section title */
.section-title{font-size:20px;font-weight:700;color:var(--off-white);margin-bottom:4px}
.section-subtitle{font-size:14px;color:var(--slate);margin-bottom:20px}

/* Toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--teal);color:var(--navy);padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Copy of BUILDSPEC highlight for search */
mark{background:rgba(46,196,182,0.25);color:var(--off-white);padding:0 1px;border-radius:2px}

/* Responsive */
@media(max-width:768px){
  .topbar-tabs{display:none}
  .topbar-links{display:none}
  .mobile-tabs{display:flex}
  .main{padding:16px 12px 100px}
  .sector-cards{grid-template-columns:1fr}
  .eval-cards{grid-template-columns:1fr}
  .num-den-row{grid-template-columns:1fr}
  .indicator-summary{flex-wrap:wrap;gap:6px}
  .subsector-tag{display:inline-block}
  .filter-panel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;border-radius:0;overflow-y:auto;margin:0}
  .fw-table{font-size:11px}
  .fw-table input{width:60px}
  .wizard-progress{flex-direction:column}
}
@media(min-width:769px) and (max-width:1024px){
  .sector-cards{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:769px){
  .subsector-tag{display:inline-block}
  .filter-pills{max-height:none}
}

/* Print */
@media print{
  body{background:#fff!important;color:#222!important}
  .topbar,.mobile-tabs,.filter-toggle,.filter-panel,.search-wrap,.card-actions,.export-bar,.wizard-nav,.btn,.no-print,.toast{display:none!important}
  .main{max-width:100%;padding:0}
  .fw-section{page-break-inside:avoid}
  .fw-table{border:1px solid #ccc}
  .fw-table th{background:#f0f0f0!important;color:#222!important;border-bottom:2px solid #666}
  .fw-table td{color:#222!important;border-bottom:1px solid #ddd}
  .fw-editable{border:1px solid #ccc;color:#222!important;background:#fff!important}

y, PMTCT. Index testing highest yield (>10%).","rec":false},{"id":"HIV02","s":"Disease Programmes","sub":"HIV/AIDS","n":"People living with HIV who know their status (1st 95)","d":"Percentage of PLHIV who know their HIV status","num":"PLHIV aware of status","den":"Estimated PLHIV (Spectrum)","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Geography","fw":"Global Fund; PEPFAR MER; SDG; UNAIDS","src":"Sentinel Surveillance; Household Survey","tools":"UNAIDS Spectrum/EPP model; PHIA Survey; DHS-8 HIV biomarker module","notes":"First \"95\" in 95-95-95. Target: 95% by 2025. Denominator modelled.","rec":false},{"id":"HIV03","s":"Disease Programmes","sub":"HIV/AIDS","n":"ART coverage (TX_CURR)","d":"Percentage of all PLHIV currently receiving ART","num":"People currently on ART","den":"Estimated PLHIV (Spectrum)","u":"%","l":"Outcome","f":"Quarterly","dis":"Sex; Age; Geography","fw":"Global Fund; PEPFAR MER; SDG; WHO 100 Core","src":"DHIS2/HMIS; Admin Records","tools":"PEPFAR MER: TX_CURR; UNAIDS Spectrum; DHIS2 ART Register; WHO Patient Monitoring Guidelines","notes":"Second \"95\". Denominator modelled. Distinguish current vs. ever initiated.","rec":true},{"id":"HIV04","s":"Disease Programmes","sub":"HIV/AIDS","n":"Viral load suppression (TX_PVLS)","d":"Percentage of ART patients with VL <1,000 copies/ml","num":"ART patients with VL <1,000","den":"ART patients with VL test result","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Geography","fw":"Global Fund; PEPFAR MER; WHO 100 Core","src":"DHIS2/HMIS; Sentinel Surveillance","tools":"PEPFAR MER: TX_PVLS; DHIS2 VL Module; LIMS VL register","notes":"Third \"95\". Target >95% among tested. <80% signals adherence/resistance problems.","rec":true},{"id":"HIV05","s":"Disease Programmes","sub":"HIV/AIDS","n":"HIV incidence rate","d":"New HIV infections per 1,000 uninfected population per year","num":"New HIV infections (estimated)","den":"Uninfected person-years","u":"per 1,000","l":"Impact","f":"Annual","dis":"Sex; Age IV19","s":"Disease Programmes","sub":"HIV/AIDS","n":"Recency testing among new positives (HTS_RECENT)","d":"Number of newly diagnosed HIV-positive individuals tested for recent infection using a rapid recency assay.","num":"New positives with recency test result","den":"Total new positives","u":"% or number","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography","fw":"PEPFAR MER","src":"Sentinel Surveillance","tools":"PEPFAR MER Indicator: HTS_RECENT; Rapid Test for Recent Infection (RTRI, LAg avidity); DHIS2 Recency Module; Recent Infection Surveillance (RITA) algorithm","notes":"Identifies recent vs. long-term infections. Clusters of recent infections guide targeted prevention. Recency assay + VL <1000 copies/ml = confirmed recent.","rec":false},{"id":"HIV20","s":"Disease Programmes","sub":"HIV/AIDS","n":"AGYW DREAMS completion","d":"Number/percentage of adolescent girls and young women (AGYW 10-24) who completed the DREAMS primary package of services.","num":"AGYW completing DREAMS primary package","den":"AGYW enrolled in DREAMS","u":"% or number","l":"Output","f":"Annual","dis":"Age (10-14, 15-19, 20-24); Geography","fw":"PEPFAR MER","src":"Routine Monitoring","tools":"PEPFAR MER Indicator: AGYW_PREV; DREAMS Layering Tool; DREAMS programme register; Primary package completion tracking form","notes":"DREAMS = Determined, Resilient, Empowered, AIDS-free, Mentored, Safe. Primary package varies by age band. Completion = received core interventions.","rec":false},{"id":"HIV21","s":"Disease Programmes","sub":"HIV/AIDS","n":"Cervical cancer screening among HIV+ women (CXCA_SCRN)","d":"Percentage of HIV-positive women on ART who were screened for cervical cancer.","num":"HIV+ women on ART screened for cervical cancer","den":"HIV+ women on ART eligible for screening","u":"%","l":"Output","f":"Annual","dis":"Age; Geography; Screening method","fw":"PEPFAR MER; WHO 100 Core","src":"DHIS2/HMIS","tools":"PEPFAR MER Indicator: CXCA_SCRN; Cervical cancer screening register; per visit).","num":"ART patients receiving 3+ months supply","den":"Total ART patients with pharmacy visit","u":"%","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography; Months dispensed","fw":"PEPFAR MER","src":"DHIS2/HMIS; Admin Records","tools":"PEPFAR MER Indicator: SC_ARVDISP; Pharmacy dispensing register; DHIS2 Pharmacy Module; Differentiated Service Delivery (DSD) monitoring forms","notes":"Key differentiated service delivery indicator. MMD reduces clinic burden and patient costs. 6-month dispensing expanding. Track alongside decongestion metrics.","rec":false},{"id":"MAL01","s":"Disease Programmes","sub":"Malaria","n":"Malaria test positivity rate","d":"Percentage of suspected malaria cases confirmed positive","num":"Confirmed positive tests","den":"Total malaria tests performed","u":"%","l":"Outcome","f":"Monthly","dis":"Age; Geography; Test type","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"DHIS2 Malaria Module; RDT/microscopy register; WHO T3 template","notes":"Key burden indicator. >5% high burden; <5% pre-elimination threshold.","rec":false},{"id":"MAL02","s":"Disease Programmes","sub":"Malaria","n":"ITN access","d":"Proportion of population that could sleep under an ITN (ITN count x 2 / HH population)","num":"Potential ITN users (ITN x 2)","den":"De facto HH population","u":"%","l":"Output","f":"Annual","dis":"Urban/Rural; Wealth Quintile; Geography","fw":"Global Fund; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8 HH Net Roster (hv227, ml0-series); MIS; MICS6 TN module","notes":"Access ≠ use. Gap = behavioural.","rec":false},{"id":"MAL03","s":"Disease Programmes","sub":"Malaria","n":"ITN use among children under 5","d":"Percentage of children under 5 sleeping under ITN previous night","num":"Children <5 under ITN last night","den":"Children <5 in surveyed HH","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Wealth Quintile; Urban/Rural","fw":"Global Fund; SDG; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8 Child Recode: ml_netc; MIS; MICS6 TN11-TN12","notes":"Conditional on access. Report use-to-access ratio.","rec":false},{"id":"MAL04","s":"Disease Programmes","sub":"Malaria","n":"IPTp3 coverage","d":"Percentage of women receiving 3+ doses of IPTp-SP during last pregnancy","num":"Women receiving 3+ IPTp-SP","den":"Women with live birth in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Geography; Wealth Quintile","fw":"Global Fund; WHO 100 Core","src":"DHS; MICS; DHIS2/HMIS","tools":"DHS-8 ANC module (m49a-series); ANC Register; MICS6 MN module","notes":"WHO recommends IPTp at each ANC visit from 13 weeks. Large IPTp1→IPTp3 drop-off = missed ANC opportunities.","rec":false},{"id":"MAL05","s":"Disease Programmes","sub":"Malaria","n":"Parasitaemia prevalence (6-59 months)","d":"Percentage of children 6-59 months with malaria parasites detected","num":"Children testing positive","den":"Children tested","u":"%","l":"Impact","f":"2-3 years","dis":"Sex; Age; Wealth Quintile; Urban/Rural; Geography","fw":"Global Fund; WHO 100 Core","src":"DHS; MIS","tools":"DHS-8 Malaria Biomarker Module; MIS protocol; MICS6 malaria module","notes":"Gold standard prevalence. Conduct during high transmission season.","rec":false},{"id":"MAL06","s":"Disease Programmes","sub":"Malaria","n":"Malaria case fatality rate (facility)","d":"Percentage of admitted malaria cases resulting in death","num":"Malaria inpatient deaths","den":"Total malaria inpatient admissions","u":"%","l":"Outcome","f":"Monthly","dis":"Age; Geography","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"DHIS2 Malaria Module; Inpatient Register; WHO severe malaria case form","notes":"Target <1%. Higher CFR = treatment quality gaps.","rec":false},{"id":"MAL07","s":"Disease Programmes","sub":"Malaria","n":"IRS coverage","d":"Percentage of population in targeted areas in sprayed structures","num":"Population in sprayed structures","den":"Target population for IRS","u":"%","l":"Output","f":"Annual","dis":"Geography","fw":"Global Fund; WHO 100 Core","src":"Admin Records","tools":"IRS Spray Operator Form; IRS Campaign Summary Report; DHIS2 Vector Control Module","notes":"Target >85% structures in targeted areas.","rec":false},{"id":"MAL08","s":"Disease Programmes","sub":"Malaria","n":"ACT treatment within 24 hours (children <5)","d":"Percentage of febrile children <5 receiving ACT within 24h of fever onset","num":"Febrile children <5 receiving ACT same/next day","den":"Children <5 with fever in past 2 weeks","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Wealth Quintile; Urban/Rural","fw":"Global Fund; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8 ml13; MICS6 CA module; iCCM Register; WHO T3 template","notes":"WHO guideline: test before treat. Increasingly tracked as \"tested AND treated\" cascade.","rec":false},{"id":"MAL09","s":"Disease Programmes","sub":"Malaria","n":"SMC coverage","d":"Percentage of eligible children receiving all rounds of seasonal malaria chemoprevention","num":"Children receiving all SMC rounds","den":"Children eligible in SMC areas","u":"%","l":"Output","f":"Annual","dis":"Geography; Age","fw":"Global Fund; WHO","src":"Admin Records; Routine Monitoring","tools":"SMC campaign tally sheet; Post-campaign coverage survey; DHIS2 SMC module","notes":"Eligible: 3-59 months in Sahel/sub-Sahel. 4 monthly rounds (July-October). Track per-round and full-course coverage.","rec":false},{"id":"MAL10","s":"Disease Programmes","sub":"Malaria","n":"Malaria incidence rate","d":"Number of confirmed malaria cases per 1,000 population at risk per year.","num":"Confirmed malaria cases","den":"Population at risk (per 1,000)","u":"per 1,000","l":"Impact","f":"Annual","dis":"Age; Geography","fw":"WHO 100 Core; SDG; Global Fund","src":"DHIS2/HMIS","tools":"DHIS2 Malaria Module: confirmed cases dataset; WHO World Malaria Report methodology; District-level HMIS case data","notes":"SDG 3.3.3. Primary WHO burden indicator. Requires reliable case-based reporting. In high-burden settings, TPR is preferred where testing coverage is inconsistent.","rec":true},{"id":"MAL11","s":"Disease Programmes","sub":"Malaria","n":"Parasitological testing rate (test before treat)","d":"Percentage of suspected malaria cases who received a parasitological test (RDT or microscopy) before treatment.","num":"Suspected cases tested (RDT + microscopy)","den":"Total suspected malaria cases","u":"%","l":"Process","f":"Monthly","dis":"Age; Geography; Test type","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"DHIS2 Malaria Module: testing vs. clinical cases dataset; OPD Register: test result column; WHO T3 (Test. Treat. Track.) monitoring template","notes":"WHO T3 guideline: test all suspected cases before treatment. Target 100%. Where <80%, presumptive treatment still occurring. Track alongside TPR for test quality.","rec":false},{"id":"MAL12","s":"Disease Programmes","sub":"Malaria","n":"SMC coverage (seasonal malaria chemoprevention)","d":"Percentage of eligible children (3-59 months in Sahel/sub-Sahel) receiving all rounds of SMC.","num":"Children receiving all SMC rounds","den":"Children eligible in SMC areas","u":"%","l":"Output","f":"Annual","dis":"Geography; Age","fw":"Global Fund; WHO","src":"Admin Records; Routine Monitoring","tools":"SMC campaign tally sheet; Post-campaign coverage survey (cluster-based); DHIS2 SMC module; SMC Alliance monitoring forms","notes":"4 monthly rounds (July-October) in Sahel/sub-Sahel. Track per-round AND full-course (all 4 rounds) coverage separately. Full-course typically 10-20pp lower than single-round.","rec":false},{"id":"MAL13","s":"Disease Programmes","sub":"Malaria","n":"Pregnant women sleeping under ITN","d":"Percentage of pregnant women who slept under an ITN the previous night.","num":"Pregnant women under ITN last night","den":"Pregnant women in surveyed HH","u":"%","l":"Outcome","f":"Annual","dis":"Wealth Quintile; Urban/Rural; Geography","fw":"Global Fund; WHO 100 Core","src":"DHS; MICS; MIS","tools":"DHS-8 Woman Questionnaire: net use during pregnancy items; MIS: pregnant women net use section; MICS6: TN module","notes":"Distinct indicator from child ITN use and general population ITN use. Pregnancy increases malaria susceptibility. Track alongside IPTp coverage for complete MiP prevention picture.","rec":false},{"id":"MAL14","s":"Disease Programmes","sub":"Malaria","n":"Proportion of severe malaria cases","d":"Percentage of confirmed malaria cases classified as severe malaria at health facility level.","num":"Severe malaria cases (admitted)","den":"Total confirmed malaria cases","u":"%","l":"Outcome","f":"Monthly","dis":"Age; Geography","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"DHIS2 Malaria Module: severe malaria dataset; Inpatient Register: severe malaria column; WHO Severe Malaria Case Management Guidelines: case classification criteria","notes":"High proportion of severe cases signals delayed treatment-seeking, drug resistance, or poor community case management. Track alongside case fatality rate. Artesunate (not quinine) is recommended first-line for severe malaria.","rec":false},{"id":"MAL15","s":"Disease Programmes","sub":"Malaria","n":"Insecticide resistance prevalence","d":"Percentage of malaria vector mosquito populations showing resistance to pyrethroid insecticides in standard bioassays.","num":"Resistant mosquito populations (surviving >10% at discriminating dose)","den":"Total populations tested","u":"%","l":"Impact","f":"Annual","dis":"Insecticide class; Vector species; Geography","fw":"WHO","src":"Sentinel Surveillance","tools":"WHO Susceptibility Bioassay (tube test protocol); WHO Bottle Bioassay; Synergist-insecticide bioassay (PBO); Molecular resistance markers (kdr, Ace-1); WHO Global Malaria Programme insecticide resistance database","notes":"Greatest threat to vector control. Track by insecticide class: pyrethroids, organophosphates, carbamates, organochlorines, neonicotinoids. PBO nets partially restore pyrethroid efficacy. Guides net procurement decisions.","rec":false},{"id":"MAL16","s":"Disease Programmes","sub":"Malaria","n":"Annual blood examination rate (ABER)","d":"Number of blood films or RDTs examined per 100 population at risk per year.","num":"Total blood films + RDTs examined","den":"Population at risk (per 100)","u":"per 100","l":"Process","f":"Annual","dis":"Geography; Test type","fw":"WHO 100 Core","src":"DHIS2/HMIS","tools":"DHIS2 Malaria Module: tests performed dataset; Laboratory register; WHO Malaria Elimination Framework: surveillance indicators","notes":"Key indicator for malaria elimination settings. Target varies: surveillance phase >10%, elimination phase 10-20% of population tested per year. Measures surveillance intensity.","rec":false},{"id":"NCD01","s":"Disease Programmes","sub":"NCDs","n":"Raised blood pressure prevalence","d":"Percentage of adults 18+ with SBP >=140 and/or DBP >=90, or on BP medication","num":"Adults with raised BP or on medication","den":"All adults 18+ measured","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural; Wealth Quintile","fw":"SDG; WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module M; STEPwise instrument v3.2; DHS-8 BP module; WHO HEARTS","notes":"SDG 3.4.1 linked. Three seated readings, average of last two. 20-35% typical in LMICs.","rec":false},{"id":"NCD02","s":"Disease Programmes","sub":"NCDs","n":"Diabetes prevalence","d":"Percentage of adults 18+ with fasting glucose >=7.0mmol/L or HbA1c >=6.5% or on medication","num":"Adults meeting threshold or on medication","den":"All adults 18+ tested","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural","fw":"SDG; WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module B; STEPwise v3.2; WHO HEARTS; WHO PEN screening","notes":"SDG 3.4.1 linked. FPG requires fasting. HbA1c expanding in LMICs.","rec":false},{"id":"NCD03","s":"Disease Programmes","sub":"NCDs","n":"Cervical cancer screening coverage","d":"Percentage of women 30-49 screened at least once","num":"Women 30-49 screened","den":"Total women 30-49","u":"%","l":"Outcome","f":"Annual","dis":"Age; Geography; Urban/Rural","fw":"SDG; WHO 100 Core","src":"DHIS2/HMIS; Household Survey","tools":"WHO Cervical Cancer Screening Register; DHIS2 Cancer Module; WHO 90-70-90 guide","notes":"WHO 90-70-90 targets by 2030. VIA, HPV DNA, cytology. HPV DNA preferred.","rec":false},{"id":"NCD04","s":"Disease Programmes","sub":"NCDs","n":"Current tobacco use prevalence","d":"Percentage of adults 15+ currently using any tobacco product","num":"Adults using tobacco","den":"All adults 15+ surveyed","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural; Education","fw":"SDG; WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module T; GATS instrument; DHS-8 tobacco module; WHO FCTC framework","notes":"SDG 3.a. GATS is gold standard. Distinguish smoked from smokeless.","rec":false},{"id":"NCD05","s":"Disease Programmes","sub":"NCDs","n":"Harmful alcohol use (heavy episodic drinking)","d":"Percentage of adults 15+ with heavy episodic drinking (60+g pure alcohol) in past 30 days","num":"Adults with HED in past 30 days","den":"All adults 15+ surveyed","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural","fw":"SDG; WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module A; WHO AUDIT (10-item); STEPwise v3.2; WHO GISAH","notes":"SDG 3.5.2. AUDIT >= 8 = hazardous use.","rec":false},{"id":"NCD06","s":"Disease Programmes","sub":"NCDs","n":"Premature NCD mortality (30-70)","d":"Probability of dying 30-70 from CVD, cancer, diabetes, or CRD","num":"Deaths from 4 NCDs in 30-69 age group","den":"Person-years in 30-69","u":"%","l":"Impact","f":"Annual","dis":"Sex; Geography","fw":"SDG; WHO 100 Core","src":"CRVS; Admin Records","tools":"WHO NCD Country Profiles; CRVS ICD-10 codes; WHO Verbal Autopsy; WHO Global NCD Target tool","notes":"SDG 3.4.1. Target: 33% reduction by 2030. Requires functioning CRVS.","rec":false},{"id":"NCD07","s":"Disease Programmes","sub":"NCDs","n":"Mental health treatment gap","d":"Percentage of people with mental disorder not receiving treatment","num":"People with disorder minus treated","den":"People with disorder","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Disorder type; Geography","fw":"WHO 100 Core","src":"Household Survey","tools":"WHO WMHS CIDI; PHQ-9 (depression, 9 items); GAD-7 (anxiety, 7 items); WHO-AIMS; WHO mhGAP-IG","notes":"Gap >75% in most LMICs for severe disorders, >90% for common disorders.","rec":false},{"id":"NCD08","s":"Disease Programmes","sub":"NCDs","n":"Depression screening prevalence","d":"Percentage of adults screening positive for current depressive episode","num":"Adults above clinical threshold","den":"Adults screened","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural","fw":"SDG; WHO 100 Core","src":"Household Survey","tools":"PHQ-9 (threshold >=10); PHQ-2 (threshold >=3); DASS-21; CES-D; WHO STEPS MH module","notes":"PHQ-9 validated in 40+ languages. Not diagnostic; clinical interview needed for diagnosis.","rec":false},{"id":"NCD09","s":"Disease Programmes","sub":"NCDs","n":"Insufficient physical activity prevalence","d":"Percentage of adults not meeting WHO recommendations (150 min moderate or 75 min vigorous/week)","num":"Adults not meeting activity threshold","den":"Adults 18+ surveyed","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural","fw":"WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module P; GPAQ (Global Physical Activity Questionnaire, 16 items); WHO STEPwise v3.2","notes":"GPAQ measures work, transport, and leisure activity. Standardised MET-minutes calculation.","rec":false},{"id":"NCD13","s":"Disease Programmes","sub":"NCDs","n":"Suicide rate","d":"Age-standardized suicide deaths per 100,000 population.","num":"Suicide deaths","den":"Population","u":"per 100,000","l":"Impact","f":"Annual","dis":"Sex; Age; Geography; Method","fw":"WHO 100 Core; SDG","src":"CRVS; Admin Records","tools":"CRVS with ICD-10 (X60-X84, Y87.0); WHO Mortality Database; WHO PRACTICE mhGAP suicide prevention protocol; WHO Verbal Autopsy: suicide cause assignment","notes":"SDG 3.4.2. WHO target: 1/3 reduction by 2030. Male:female ratio typically 2-3:1. CRVS underreporting is significant. Verbal/psychological autopsy methods needed where CRVS is weak.","rec":false},{"id":"NCD14","s":"Disease Programmes","sub":"NCDs","n":"Road traffic injury mortality rate","d":"Number of road traffic deaths per 100,000 population.","num":"Road traffic deaths","den":"Population","u":"per 100,000","l":"Impact","f":"Annual","dis":"Sex; Age; Road user type; Geography","fw":"WHO 100 Core; SDG","src":"CRVS; Admin Records","tools":"CRVS with ICD-10 (V01-V89); WHO Global Status Report on Road Safety methodology; Police/traffic authority crash reports; Hospital trauma registry","notes":"SDG 3.6.1. WHO target: 50% reduction by 2030. LMICs account for 92% of road deaths. Vulnerable road users (pedestrians, cyclists, motorcyclists) disproportionately affected.","rec":false},{"id":"NCD15","s":"Disease Programmes","sub":"NCDs","n":"Overweight and obesity prevalence in adults","d":"Percentage of adults 18+ with BMI >=25 (overweight) or BMI >=30 (obesity).","num":"Adults with BMI >=25 or >=30","den":"All adults 18+ measured","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural","fw":"WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module M: BMI measurement protocol (height and weight); STEPwise instrument v3.2; DHS-8 anthropometry module (where included)","notes":"Report both >=25 (overweight + obese) and >=30 (obese only). Double burden: rising obesity coexisting with undernutrition in same populations. Associated with CVD, diabetes, cancer.","rec":false},{"id":"NCD16","s":"Disease Programmes","sub":"NCDs","n":"Insufficient fruit and vegetable intake","d":"Percentage of adults 18+ consuming less than 5 servings (400g) of fruit and vegetables per day.","num":"Adults consuming <5 servings/day","den":"Adults 18+ surveyed","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Urban/Rural","fw":"WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module D: Fruit and Vegetable Consumption (4 questions on frequency and servings per day); STEPwise instrument v3.2","notes":"WHO recommends >=5 servings (400g) per day. Globally ~75% of adults do not meet this. Major risk factor for CVD, cancer, and diabetes. STEPS uses show-cards for serving size estimation.","rec":false},{"id":"NCD17","s":"Disease Programmes","sub":"NCDs","n":"Hypertension treatment and control coverage","d":"Percentage of adults with hypertension who are (a) aware, (b) on treatment, and (c) have controlled BP (<140/90).","num":"Hypertensive adults aware / on treatment / controlled","den":"All adults with hypertension","u":"% (cascade)","l":"Outcome","f":"3-5 years","dis":"Sex; Age; Urban/Rural; Wealth Quintile","fw":"WHO 100 Core","src":"Household Survey","tools":"WHO STEPS Module M and H: BP measurement + treatment questions; WHO HEARTS Technical Package: hypertension cascade; Resolve to Save Lives: BP cascade methodology; DHS-8 BP module","notes":"Cascade: diagnosed → treated → controlled. Globally ~50% aware, ~40% treated, ~20% controlled. HEARTS package improving. Track each cascade step separately. \"Rule of halves\" is the rule of quarters in many LMICs.","rec":true},{"id":"NCD10","s":"Disease Programmes","sub":"NTDs","n":"Preventive chemotherapy coverage for NTDs","d":"Percentage of population requiring PC for at least one NTD who received it","num":"People receiving PC","den":"Population requiring PC","u":"%","l":"Outcome","f":"Annual","dis":"Age; Sex; Geography; NTD type","fw":"SDG; WHO 100 Core","src":"DHIS2/HMIS; Admin Records","tools":"WHO PCT Databank; WHO JRF for PC-NTDs; MDA register/tally; WHO ESPEN; Post-MDA coverage survey","notes":"SDG 3.3.5. Five PC-NTDs. Report by disease. Threshold varies by disease (65-80%).","rec":false},{"id":"TB01","s":"Disease Programmes","sub":"Tuberculosis","n":"TB case notification rate","d":"New and relapse TB cases notified per 100,000 population","num":"New + relapse TB cases notified","den":"Total population","u":"per 100,000","l":"Outcome","f":"Quarterly","dis":"Sex; Age; Geography; HIV status","fw":"Global Fund; SDG; WHO 100 Core","src":"DHIS2/HMIS","tools":"WHO TB forms: TB 01, TB 03; DHIS2 TB Module; WHO e-TB Manager","notes":"SDG 3.3.2. Compare notification to WHO estimated incidence for detection gap.","rec":false},{"id":"TB02","s":"Disease Programmes","sub":"Tuberculosis","n":"TB treatment success rate","d":"Percentage of DS-TB cases with successful treatment outcomes","num":"Cured + treatment completed","den":"All registered in cohort","u":"%","l":"Outcome","f":"Annual (cohort)","dis":"Sex; Age; HIV status; DR status; Geography","fw":"Global Fund; SDG; WHO 100 Core","src":"DHIS2/HMIS","tools":"WHO TB Treatment Card (TB 01); WHO TB Cohort Analysis Form (TB 08); DHIS2 TB Module","notes":"Target >=90% DS-TB. Disaggregate outcomes: cured, completed, failed, died, LTFU.","rec":false},{"id":"TB03","s":"Disease Programmes","sub":"Tuberculosis","n":"Bacteriologically confirmed TB proportion","d":"Percentage of pulmonary TB bacteriologically confirmed","num":"BC pulmonary TB cases","den":"Total pulmonary TB notified","u":"%","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"WHO TB Lab Register (TB 04); GeneXpert register; DHIS2 TB lab dataset","notes":"Target >85%. Low = over-reliance on clinical diagnosis.","rec":false},{"id":"TB04","s":"Disease Programmes","sub":"Tuberculosis","n":"DR-TB detection rate","d":"Percentage of BC-TB tested for rifampicin resistance","num":"BC-TB cases with DST result","den":"Total BC-TB cases","u":"%","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"GeneXpert MTB/RIF register; WHO DR-TB Register; DHIS2 DR-TB dataset","notes":"WHO recommends universal DST. RR = proxy for MDR-TB (>90% concordance).","rec":false},{"id":"TB05","s":"Disease Programmes","sub":"Tuberculosis","n":"TPT coverage among PLHIV","d":"Percentage of PLHIV completing TB preventive treatment","num":"PLHIV completing TPT","den":"PLHIV eligible for TPT","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Geography","fw":"Global Fund; PEPFAR MER; WHO 100 Core","src":"DHIS2/HMIS","tools":"PEPFAR MER: TB_PREV; WHO TPT Register; DHIS2 HIV Module TPT dataset","notes":"Track initiation AND completion. Completion 60-80% typical.","rec":false},{"id":"TB06","s":"Disease Programmes","sub":"Tuberculosis","n":"TB contact investigation coverage","d":"Percentage of index TB cases whose HH contacts were evaluated","num":"HH contacts evaluated","den":"Expected contacts of index cases","u":"%","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"WHO Contact Investigation Form; DHIS2 TB contact dataset","notes":"Track cascade: listed→evaluated→with TB→on TPT. Under-5 contacts without TB should receive TPT.","rec":false},{"id":"TB07","s":"Disease Programmes","sub":"Tuberculosis","n":"TB mortality rate","d":"Deaths due to TB per 100,000 population per year","num":"TB deaths (estimated)","den":"Total population","u":"per 100,000","l":"Impact","f":"Annual","dis":"Sex; HIV status; Geography","fw":"SDG; WHO 100 Core","src":"CRVS; Admin Records","tools":"WHO Global TB Database; Verbal Autopsy; CRVS ICD-10 (A15-A19); Spectrum/TIME model","notes":"Usually modelled. Disaggregate HIV-negative and HIV-associated TB deaths.","rec":false},{"id":"TB08","s":"Disease Programmes","sub":"Tuberculosis","n":"TB treatment coverage (notified/estimated)","d":"Proportion of estimated incident TB cases that were diagnosed and notified (treatment coverage = notifications / estimated incidence).","num":"New + relapse TB cases notified","den":"Estimated TB incidence (WHO modelled)","u":"%","l":"Impact","f":"Annual","dis":"Sex; Geography","fw":"WHO 100 Core; Global Fund; SDG","src":"DHIS2/HMIS; Admin Records","tools":"WHO Global TB Database: modelled incidence estimates; WHO TB Report country profiles; DHIS2 TB Module notification data","notes":"Globally ~78%. Gap = undiagnosed TB. Key metric for assessing how much of the epidemic is being reached. Detection gap = 100% minus treatment coverage.","rec":true},{"id":"TB09","s":"Disease Programmes","sub":"Tuberculosis","n":"TB incidence rate (WHO estimate)","d":"Estimated number of new TB cases per 100,000 population per year, including HIV-associated TB.","num":"Estimated new TB cases","den":"Total population","u":"per 100,000","l":"Impact","f":"Annual","dis":"Sex; HIV status; Geography","fw":"WHO 100 Core; SDG","src":"Admin Records","tools":"WHO Global TB Database: Bayesian estimation methodology; Spectrum/TIME model; National TB prevalence surveys (where available)","notes":"Usually modelled, not directly measured. National prevalence surveys provide direct estimates for calibration. Declining at ~2% per year globally — need 10% per year to meet End TB targets.","rec":false},{"id":"TB10","s":"Disease Programmes","sub":"Tuberculosis","n":"TB case fatality rate (among notified)","d":"Proportion of notified TB cases who died during treatment (from any cause).","num":"TB deaths during treatment (all causes)","den":"TB cases registered in cohort","u":"%","l":"Outcome","f":"Annual (cohort)","dis":"Sex; Age; HIV status; DR status","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"WHO TB Cohort Analysis Form (TB 08): death outcome category; DHIS2 TB Module treatment outcome dataset","notes":"Includes death from TB and from non-TB causes during treatment. DS-TB CFR should be <5%. HIV-associated TB CFR higher (10-20%). High CFR signals late diagnosis, HIV coinfection, or poor case management.","rec":false},{"id":"TB11","s":"Disease Programmes","sub":"Tuberculosis","n":"DR-TB treatment success rate","d":"Percentage of RR/MDR-TB patients successfully treated (cured + completed) in a specified cohort.","num":"RR/MDR-TB cured + completed","den":"RR/MDR-TB registered in cohort","u":"%","l":"Outcome","f":"Annual (cohort)","dis":"Sex; Age; Geography","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"WHO DR-TB Treatment Card and Register; DHIS2 DR-TB Module; WHO DR-TB cohort analysis form","notes":"Global target >=75%. Currently ~68% globally. Treatment duration 9-20 months depending on regimen. All-oral BPaL/BPaLM regimen improving outcomes. Separate cohort from DS-TB.","rec":false},{"id":"TB12","s":"Disease Programmes","sub":"Tuberculosis","n":"Childhood TB notification rate","d":"Number of children (0-14 years) notified with TB per 100,000 child population.","num":"Child TB cases notified (0-14)","den":"Population 0-14 years","u":"per 100,000","l":"Outcome","f":"Annual","dis":"Age (0-4, 5-14); Sex; Geography","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"WHO TB Register (TB 03): age-disaggregated data; Childhood TB diagnosis algorithm (WHO 2022); Stool-based GeneXpert Xpert MTB/RIF Ultra; Chest X-ray with CAD (Computer-Aided Detection)","notes":"WHO estimates 1.3 million child TB cases/year, ~50% notified. Under-diagnosis is severe. Stool-based GeneXpert and digital CXR improving detection. Contact investigation of children <5 is critical entry point.","rec":false},{"id":"TB13","s":"Disease Programmes","sub":"Tuberculosis","n":"Active case finding (ACF) yield","d":"Number of TB cases detected per 1,000 people screened through active case finding activities.","num":"TB cases detected through ACF","den":"People screened (per 1,000)","u":"per 1,000 screened","l":"Output","f":"Quarterly","dis":"Screening venue; Population group; Geography","fw":"Global Fund","src":"DHIS2/HMIS; Routine Monitoring","tools":"ACF screening register; Mobile/portable digital X-ray with CAD screening results; GeneXpert sputum testing register; Community-based screening tally sheet","notes":"ACF yield varies enormously by target population: general community (1-5 per 1,000), HH contacts (10-30), HIV clinics (5-15), prisons (5-20), miners (10-30). Track number needed to screen (NNS) per case detected.","rec":false},{"id":"TB14","s":"Disease Programmes","sub":"Tuberculosis","n":"Bedaquiline-based treatment coverage for DR-TB","d":"Percentage of RR/MDR-TB patients initiated on a bedaquiline-containing regimen.","num":"RR/MDR-TB patients on BDQ-containing regimen","den":"Total RR/MDR-TB patients initiated on treatment","u":"%","l":"Process","f":"Quarterly","dis":"Geography","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"DR-TB Treatment Register: regimen column; DHIS2 DR-TB Module; WHO Operational Handbook on TB Module 4 (DR-TB treatment)","notes":"WHO recommends all-oral BPaL/BPaLM as preferred regimen (2022). Target: 100% transition from injectable-based regimens. Track alongside QTc monitoring (ECG) for cardiac safety.","rec":false},{"id":"TB15","s":"Disease Programmes","sub":"Tuberculosis","n":"TB notification by sector (public vs. private)","d":"Proportion of total TB notifications contributed by public sector vs. private/non-state sector health facilities.","num":"Notifications from private sector","den":"Total notifications","u":"%","l":"Process","f":"Annual","dis":"Sector (public, private, NGO); Geography","fw":"Global Fund","src":"DHIS2/HMIS; Admin Records","tools":"National TB notification database; Private sector engagement mapping tool; Nikshay (India) or equivalent national case-based surveillance; DHIS2 TB Module: facility type disaggregation","notes":"Critical in countries where private sector treats majority of patients (India, Indonesia, Nigeria, Pakistan, Bangladesh). Mandatory notification policies + digital reporting systems needed.","rec":false},{"id":"RMN01","s":"RMNCAH","sub":"Antenatal Care","n":"ANC4+ coverage","d":"Percentage of women with a live birth in past 2 years who received 4+ ANC visits","num":"Women with 4+ ANC visits","den":"Women with live birth in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural; Geography","fw":"Global Fund; SDG; WHO 100 Core","src":"DHS; MICS; DHIS2/HMIS","tools":"DHS-8 Module 4: m14; MICS6 MN2-MN17; ANC Register; DHIS2 ANC Module","notes":"WHO now recommends 8+ contacts. ANC4+ still widely reported. Track ANC1→4 dropout.","rec":false},{"id":"RMN02","s":"RMNCAH","sub":"Antenatal Care","n":"ANC first visit in first trimester","d":"Percentage with first ANC visit <12 weeks gestation","num":"Women with ANC1 in first trimester","den":"Women with live birth in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural","fw":"WHO 100 Core","src":"DHS; MICS; DHIS2/HMIS","tools":"DHS-8: m13; MICS6: MN5; ANC Register; DHIS2 ANC Module","notes":"Early ANC enables HIV/syphilis testing, BP monitoring, dating scan.","rec":false},{"id":"RMN03","s":"RMNCAH","sub":"Antenatal Care","n":"Syphilis screening in ANC","d":"Percentage of ANC attendees screened for syphilis","num":"ANC attendees screened for syphilis","den":"Total ANC1 attendees","u":"%","l":"Outcome","f":"Annual","dis":"Geography","fw":"Global Fund; WHO 100 Core","src":"DHIS2/HMIS","tools":"ANC Register: syphilis testing column; RDT results register; WHO ANC service delivery guidelines; DHS-8 (new in DHS-8)","notes":"New in DHS-8. WHO recommends universal screening at first ANC visit. Track treatment of positives.","rec":false},{"id":"RMN04","s":"RMNCAH","sub":"Antenatal Care","n":"Iron-folic acid supplementation 90+ days","d":"Percentage of women taking IFA for 90+ days during pregnancy","num":"Women taking IFA 90+ days","den":"Women with live birth in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural","fw":"SDG; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8 Module 4: m45/m46; MICS6: MN8-MN10; ANC Register","notes":"WHO recommends daily IFA throughout pregnancy (180+ days). Supply and adherence are key barriers.","rec":false},{"id":"RMN23","s":"RMNCAH","sub":"Antenatal Care","n":"Hepatitis B screening in ANC","d":"Percentage of ANC attendees screened for hepatitis B surface antigen (HBsAg).","num":"ANC attendees tested for HBsAg","den":"Total ANC1 attendees","u":"%","l":"Output","f":"Annual","dis":"Geography","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"ANC Register: HBV testing column; HBsAg RDT results register; DHIS2 ANC Module; WHO HBV screening guidelines for pregnant women","notes":"WHO recommends universal HBV screening in ANC. Prevents mother-to-child transmission through timely birth dose vaccination and antiviral prophylaxis. Track alongside birth dose HepB vaccination.","rec":false},{"id":"RMN17","s":"RMNCAH","sub":"Child Health","n":"Neonatal mortality rate","d":"Deaths in first 28 days per 1,000 live births","num":"Deaths in first 28 days","den":"Live births","u":"per 1,000","l":"Impact","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"SDG; WHO 100 Core","src":"DHS; MICS; CRVS","tools":"DHS-8 full birth history; MICS6; UN-IGME; WHO Verbal Autopsy (2016)","notes":"SDG 3.2.2. Target <=12 by 2030. Requires full birth history.","rec":true},{"id":"RMN18","s":"RMNCAH","sub":"Child Health","n":"Under-5 mortality rate","d":"Probability of dying before age 5 per 1,000 live births","num":"Deaths under 5","den":"Live births","u":"per 1,000","l":"Impact","f":"Annual","dis":"Sex; Geography; Wealth Quintile; Urban/Rural","fw":"SDG; WHO 100 Core","src":"DHS; MICS; CRVS","tools":"DHS-8 full birth history; MICS6; UN-IGME; WHO Verbal Autopsy","notes":"SDG 3.2.1. Target <=25 by 2030.","rec":true},{"id":"RMN19","s":"RMNCAH","sub":"Child Health","n":"Maternal mortality ratio","d":"Maternal deaths per 100,000 live births","num":"Maternal deaths","den":"Live births","u":"per 100,000","l":"Impact","f":"Annual","dis":"Geography; Cause of death","fw":"SDG; WHO 100 Core","src":"CRVS; DHS; Household Survey","tools":"CRVS with ICD-MM; DHS-8 Sibling Survival Module; WHO MMEIG; RAMOS; MDSR Toolkit; Verbal Autopsy","notes":"SDG 3.1.1. Target <70 by 2030. DHS estimates have wide CIs. MDSR provides facility learning.","rec":true},{"id":"RMN20","s":"RMNCAH","sub":"Child Health","n":"Care-seeking for pneumonia","d":"Percentage of children <5 with ARI symptoms taken to health provider","num":"Children with ARI taken to provider","den":"Children <5 with ARI in past 2 weeks","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Wealth Quintile; Urban/Rural","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: h31-h32; MICS6: CA1-CA5; WHO/UNICEF iCCM Register","notes":"Major U5 mortality driver. Track antibiotic treatment rate alongside.","rec":false},{"id":"RMN21","s":"RMNCAH","sub":"Child Health","n":"ORS and zinc for diarrhea","d":"Percentage of children <5 with diarrhea receiving ORS and zinc","num":"Children with diarrhea receiving ORS + zinc","den":"Children <5 with diarrhea in past 2 weeks","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Wealth Quintile; Urban/Rural","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: h13-h15t; MICS6: CA1-CA5c; iCCM Register; pharmacy survey","notes":"WHO/UNICEF recommend ORS + zinc. Zinc coverage remains very low (<5% in many countries).","rec":false},{"id":"RMN22","s":"RMNCAH","sub":"Child Health","n":"Vitamin A supplementation (2 doses/year)","d":"Percentage of children 6-59 months receiving 2 VAS doses per year","num":"Children receiving 2 VAS doses","den":"Children 6-59 months","u":"%","l":"Outcome","f":"Semi-annual","dis":"Sex; Age; Geography","fw":"WHO 100 Core","src":"DHIS2/HMIS; Admin Records","tools":"VAS campaign tally; Child Health Card; DHIS2 Nutrition Module; UNICEF VAS monitoring; PEC survey","notes":"Two high-dose VAS per year (4-6 months apart). Two-dose typically lower than single-dose.","rec":false},{"id":"RMN27","s":"RMNCAH","sub":"Child Health","n":"Infant mortality rate","d":"Probability of dying between birth and age 1 per 1,000 live births.","num":"Deaths between birth and age 1","den":"Live births","u":"per 1,000","l":"Impact","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"WHO 100 Core","src":"DHS; MICS; CRVS","tools":"DHS-8 full birth history module; MICS6 Birth History; UN-IGME modelled estimates; CRVS","notes":"Distinct from NMR (0-28 days) and U5MR (0-59 months). IMR = NMR + post-neonatal mortality (1-11 months). Post-neonatal deaths are more amenable to public health interventions (infections, diarrhoea, pneumonia).","rec":false},{"id":"RMN28","s":"RMNCAH","sub":"Child Health","n":"Pneumonia treatment with antibiotics","d":"Percentage of children under 5 with suspected pneumonia who received antibiotics.","num":"Children with ARI receiving antibiotics","den":"Children <5 with ARI symptoms in past 2 weeks","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Wealth Quintile; Urban/Rural","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8 Child Module: h31-h32 (ARI) + h37 treatment (antibiotics); MICS6 CA module; WHO/UNICEF iCCM Register: pneumonia treatment section","notes":"Distinct from care-seeking indicator (which measures whether care was sought, not what treatment was received). WHO recommends amoxicillin for fast breathing. Track both care-seeking AND appropriate treatment.","rec":false},{"id":"RMN29","s":"RMNCAH","sub":"Child Health","n":"Maternal near-miss rate","d":"Number of women with severe maternal complications who survived per 1,000 live births.","num":"Near-miss cases (WHO criteria)","den":"Live births","u":"per 1,000","l":"Outcome","f":"Annual","dis":"Geography; Facility level; Cause","fw":"WHO 100 Core; EPMM","src":"Facility Assessment","tools":"WHO Maternal Near-Miss Tool: clinical, laboratory, and management criteria; Facility-based audit form; EPMM monitoring framework; MDSR process documentation","notes":"WHO near-miss criteria: organ dysfunction markers (clinical, laboratory, management-based). Near-miss:mortality ratio indicates quality of obstetric care. Higher ratio = better care (more women surviving severe complications). Requires functioning CEmONC.","rec":false},{"id":"RMN05","s":"RMNCAH","sub":"Delivery & Newborn","n":"Skilled birth attendance","d":"Percentage of live births attended by skilled health personnel","num":"Live births with skilled attendant","den":"Total live births","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural; Education","fw":"SDG; WHO 100 Core","src":"DHS; MICS; DHIS2/HMIS","tools":"DHS-8: m3a-m3g; MICS6: MN18-MN20; Maternity Register; DHIS2 Delivery Module","notes":"SDG 3.1.2. WHO 2018 definition: competent MNH professional.","rec":true},{"id":"RMN06","s":"RMNCAH","sub":"Delivery & Newborn","n":"Institutional delivery rate","d":"Percentage of live births in a health facility","num":"Facility live births","den":"Total live births","u":"%","l":"Outcome","f":"Annual","dis":"Wealth Quintile; Urban/Rural; Geography","fw":"WHO 100 Core","src":"DHS; MICS; DHIS2/HMIS","tools":"DHS-8: m15; MICS6: MN18; Maternity Register; DHIS2 Delivery Module","notes":"Proxy for EmONC access. Track C-section rate alongside (10-15% reference).","rec":false},{"id":"RMN07","s":"RMNCAH","sub":"Delivery & Newborn","n":"Uterotonic within 1 minute of birth","d":"Percentage receiving uterotonic immediately after birth for PPH prevention","num":"Women receiving uterotonic post-delivery","den":"Women delivering at facility","u":"%","l":"Outcome","f":"Annual","dis":"Geography; Facility level","fw":"WHO 100 Core","src":"Facility Assessment; DHIS2/HMIS","tools":"WHO EmONC signal function 6; SPA delivery observation; Maternity Register; WHO Labour Care Guide","notes":"Part of AMTSL. PPH = leading cause of maternal death. Oxytocin preferred.","rec":false},{"id":"RMN08","s":"RMNCAH","sub":"Delivery & Newborn","n":"Early initiation of breastfeeding","d":"Percentage of newborns put to breast within 1 hour of birth","num":"Newborns breastfed within 1 hour","den":"Total live births","u":"%","l":"Outcome","f":"Annual","dis":"Delivery mode; Geography; Wealth Quintile","fw":"SDG; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: v426; MICS6: BD2; Maternity Register; WHO BFHI assessment tool","notes":"Reduces neonatal mortality by 22%. Particularly low after C-sections.","rec":false},{"id":"RMN09","s":"RMNCAH","sub":"Delivery & Newborn","n":"Kangaroo mother care initiation","d":"Percentage of newborns <2,000g initiated on KMC","num":"Newborns <2,000g on KMC","den":"Total newborns <2,000g","u":"%","l":"Outcome","f":"Annual","dis":"Geography; Facility level","fw":"ENAP; WHO 100 Core","src":"DHIS2/HMIS; Facility Assessment","tools":"KMC register; Maternity/neonatal ward register; WHO KMC guidelines; ENAP monitoring framework","notes":"ENAP core indicator. Skin-to-skin contact ≥18 hours/day. Requires KMC ward or unit.","rec":false},{"id":"RMN10","s":"RMNCAH","sub":"Delivery & Newborn","n":"Neonatal resuscitation with bag-and-mask","d":"Percentage of non-breathing newborns resuscitated with bag-and-mask","num":"Newborns resuscitated","den":"Newborns requiring resuscitation","u":"%","l":"Process","f":"Annual","dis":"Geography; Facility level","fw":"ENAP","src":"Facility Assessment","tools":"Helping Babies Breathe (HBB) programme monitoring forms; BEmONC signal function checklist; Delivery register: resuscitation column","notes":"BEmONC signal function 7. ~10% of newborns require stimulation, ~1% require bag-and-mask ventilation.","rec":false},{"id":"RMN11","s":"RMNCAH","sub":"Delivery & Newborn","n":"Stillbirth rate","d":"Third-trimester stillbirths per 1,000 total births","num":"Stillbirths >=28 weeks","den":"Live births + stillbirths","u":"per 1,000","l":"Impact","f":"Annual","dis":"Geography; Fresh vs. macerated","fw":"ENAP; WHO 100 Core","src":"DHIS2/HMIS; CRVS; DHS","tools":"Maternity Register; DHIS2 Delivery Module; WHO PDSR tools; CRVS","notes":"ENAP target <=12 per 1,000 by 2030. Distinguish fresh (intrapartum) from macerated (antepartum). Most underreported.","rec":false},{"id":"RMN12","s":"RMNCAH","sub":"Delivery & Newborn","n":"EmONC signal function availability","d":"Percentage of expected EmONC facilities performing all required signal functions","num":"Facilities performing all signal functions","den":"Expected EmONC facilities","u":"%","l":"Output","f":"Annual","dis":"Geography; BEmONC/CEmONC","fw":"WHO 100 Core","src":"Facility Assessment","tools":"WHO/UNFPA/UNICEF EmONC Needs Assessment Tool; BEmONC 7 / CEmONC 9 signal functions; WHO EmONC Handbook","notes":"WHO norm: >=5 per 500,000 (>=1 CEmONC). Signal functions assessed over past 3 months.","rec":false},{"id":"RMN24","s":"RMNCAH","sub":"Delivery & Newborn","n":"Antenatal corticosteroids for preterm birth","d":"Percentage of women at risk of imminent preterm birth (24-34 weeks) who received antenatal corticosteroids.","num":"Women receiving ACS","den":"Women with imminent preterm birth (24-34 weeks)","u":"%","l":"Outcome","f":"Annual","dis":"Geography; Facility level","fw":"ENAP; WHO 100 Core","src":"DHIS2/HMIS; Facility Assessment","tools":"Maternity Register: ACS column; ENAP monitoring framework; WHO recommendations on interventions to improve preterm birth outcomes; Clinical observation audit form","notes":"ENAP core indicator. Effective only when given at facilities with adequate neonatal care (CEmONC+ level). Inappropriate use at lower-level facilities can be harmful. Track alongside preterm birth rate.","rec":false},{"id":"RMN25","s":"RMNCAH","sub":"Delivery & Newborn","n":"Chlorhexidine cord care","d":"Percentage of newborns who received chlorhexidine (4% CHX) application to the umbilical cord stump within 24 hours of birth.","num":"Newborns receiving CHX cord care","den":"Total live births","u":"%","l":"Output","f":"Annual","dis":"Geography; Home vs. facility delivery","fw":"ENAP; WHO 100 Core","src":"DHIS2/HMIS; Household Survey","tools":"Maternity Register: cord care column; ENAP monitoring framework; DHS-8 (where cord care module included); Community-based newborn care  Track alongside early marriage. Concentrated among poorest.","rec":false},{"id":"RMN13","s":"RMNCAH","sub":"Postnatal Care","n":"PNC within 48 hours (mother)","d":"Percentage of women with PNC within 2 days of delivery","num":"Women with PNC within 48 hours","den":"Women with live birth in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: m50-m52; MICS6: PN1-PN6; PNC Register; WHO PNC Checklist","notes":"One of the most neglected coverage gaps. WHO recommends first PNC within 24 hours. DHS-8 expanded PNC content measurement.","rec":false},{"id":"RMN14","s":"RMNCAH","sub":"Postnatal Care","n":"PNC within 48 hours (newborn)","d":"Percentage of newborns receiving postnatal health check within 2 days of birth","num":"Newborns with PNC within 48 hours","den":"Live births in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Geography; Wealth Quintile","fw":"ENAP; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: postnatal care for newborn questions (new in DHS-8); MICS6: PN module; Maternity register","notes":"New in DHS-8. Content of PNC check matters: cord examination, temperature, breastfeeding assessment, danger signs.","rec":false},{"id":"RMN26","s":"RMNCAH","sub":"Postnatal Care","n":"Postpartum family planning uptake","d":"Percentage of women who adopted a modern contraceptive method within 6 weeks postpartum.","num":"Women using modern FP within 6 weeks postpartum","den":"Women delivering in past 6 months","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Method; Geography","fw":"WHO 100 Core","src":"DHS; MICS; DHIS2/HMIS","tools":"DHS-8 postpartum period and FP module; Maternity/PNC Register: FP counseling and uptake columns; DHIS2 FP Module; WHO PPFP framework","notes":"Short interpregnancy interval (<24 months) increases risk for adverse outcomes. Track alongside birth spacing indicators. Method mix matters: LARC (IUD, implant) most effective for PP

/* ── Toast ── */
function Toast({message}){
  if(!message)return null;
  return <div className="toast">{message}</div>;
}

/* ── Indicator Card ── */
const IndicatorCard=memo(function IndicatorCard({ind,expanded,onToggle,inBasket,onAdd,onRemove,searchQuery}){
  const sectorColor=SECTOR_COLORS[ind.s]||'#8899AA';
  const levelColor=LEVEL_COLORS[ind.l]||'#8899AA';
  const levelClass='level-'+ind.l.toLowerCase();
  const instruments=splitField(ind.tools);
  const frameworks=splitField(ind.fw);
  const sources=splitField(ind.src);
  const disaggs=splitField(ind.dis);

  const copyToClipboard=()=>{
    const text=`${ind.id}: ${ind.n}\nDefinition: ${ind.d}\nLevel: ${ind.l} | Unit: ${ind.u} | Frequency: ${ind.f}\nNumerator: ${ind.num}\nDenominator: ${ind.den}\nInstruments: ${ind.tools}\nFrameworks: ${ind.fw}\nSources: ${ind.src}\nDisaggregation: ${ind.dis}\nNotes: ${ind.notes}`;
    navigator.clipboard.writeText(text).catch(()=>{});
  };

  return <div className="indicator-row">
    <div className="indicator-summary" onClick={onToggle}>
      <span className="id-badge" style={{background:sectorColor+'20',color:sectorColor}}>{highlightText(ind.id,searchQuery)}</span>
      <span className={`level-badge ${levelClass}`}>{ind.l}</span>
      <span className="indicator-name">{highlightText(ind.n,searchQuery)}</span>
      {ind.rec&&<span className="rec-badge">Recommended</span>}
      <span className="subsector-tag">{ind.sub}</span>
      <span className={`expand-arrow${expanded?' open':''}`}><IconChevron/></span>
    </div>
    {expanded&&<div className="indicator-detail">
      <div className="detail-section">
        <div className="detail-label">Definition</div>
        <div className="detail-text">{highlightText(ind.d,searchQuery)}</div>
      </div>
      <div className="detail-section">
        <div className="num-den-row">
          <div className="num-box"><div className="detail-label">Numerator</div><div className="detail-text">{ind.num}</div></div>
          <div className="den-box"><div className="detail-label">Denominator</div><div className="detail-text">{ind.den}</div></div>
        </div>
      </div>
      <div className="detail-section">
        <div className="meta-row">
          <span className="meta-item"><strong>Unit:</strong>{ind.u}</span>
          <span className="meta-item"><strong>Frequency:</strong>{ind.f}</span>
          <span className="meta-item"><strong>Level:</strong>{ind.l}</span>
        </div>
      </div>
      {instruments.length>0&&<div className="detail-section">
        <div className="instruments-panel">
          <div className="detail-label">Data Collection Instruments</div>
          {instruments.map((t,i)=><div key={i} className="instrument-line">{highlightText(t,searchQuery)}</div>)}
        </div>
      </div>}
      {frameworks.length>0&&<div className="detail-section">
        <div className="detail-label">Frameworks</div>
        <div className="tag-row">{frameworks.map(f=><span key={f} className="tag-pill fw">{f}</span>)}</div>
      </div>}
      {sources.length>0&&<div className="detail-section">
        <div className="detail-label">Data Sources</div>
        <div className="tag-row">{sources.map(s=><span key={s} className="tag-pill src">{s}</span>)}</div>
      </div>}
      {disaggs.length>0&&<div className="detail-section">
        <div className="detail-label">Disaggregation</div>
        <div className="tag-row">{disaggs.map(d=><span key={d} className="tag-pill dis">{d}</span>)}</div>
      </div>}
      {ind.notes&&<div className="detail-section">
        <div className="practitioner-note" style={{borderLeftColor:sectorColor}}>{highlightText(ind.notes,searchQuery)}</div>
      </div>}
      <div className="card-actions no-print">
        {inBasket
          ?<button className="btn btn-coral btn-sm" onClick={e=>{e.stopPropagation();onRemove(ind.id)}}><IconX/> Remove from Framework</button>
          :<button className="btn btn-teal btn-sm" onClick={e=>{e.stopPropagation();onAdd(ind.id)}}><IconPlus/> Add to Framework</button>
        }
        <button className="btn btn-outline btn-sm" onClick={e=>{e.stopPropagation();copyToClipboard()}}><IconCopy/> Copy</button>
      </div>
    </div>}
  </div>;
});

/* ── Wizard View ── */
function WizardView({basket,onAdd,onRemove,setActiveTab}){
  const[step,setStep]=useState(1);
  const[selSectors,setSelSectors]=useState([]);
  const[selSubs,setSelSubs]=useState([]);
  const[evalType,setEvalType]=useState(null);
  const[selFrameworks,setSelFw]=useState([]);

  const sectorCounts=useMemo(()=>countBy(DB,'s'),[]);
  const subsForSectors=useMemo(()=>{
    const m={};DB.forEach(i=>{if(selSectors.includes(i.s)){if(!m[i.sub])m[i.sub]=0;m[i.sub]++}});return m;
  },[selSectors]);

  const toggleSector=(s)=>{
    setSelSectors(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);
    setSelSubs([]);
  };
  const toggleSub=(s)=>setSelSubs(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);
  const toggleFw=(f)=>setSelFw(prev=>prev.includes(f)?prev.filter(x=>x!==f):[...prev,f]);

  const wizardResults=useMemo(()=>{
    let filtered=DB.filter(i=>{
      if(selSectors.length&&!selSectors.includes(i.s))return false;
      if(selSubs.length&&!selSubs.includes(i.sub))return false;
      if(selFrameworks.length){const iFw=splitField(i.fw);if(!selFrameworks.some(f=>iFw.includes(f)))return false}
      return true;
    });
    if(evalType){
      const emphasized=EVAL_TYPES.find(e=>e.name===evalType);
      if(emphasized){
        filtered.sort((a,b)=>{
          const aE=emphasized.levels.includes(a.l)?0:1;
          const bE=emphasized.levels.includes(b.l)?0:1;
          return aE-bE;
        });
      }
    }
    return filtered;
  },[selSectors,selSubs,evalType,selFrameworks]);

  const resultsByLevel=useMemo(()=>{
    const m={Impact:[],Outcome:[],Output:[],Process:[]};
    wizardResults.forEach(i=>{if(m[i.l])m[i.l].push(i)});
    return m;
  },[wizardResults]);

  const emphLevels=evalType?EVAL_TYPES.find(e=>e.name===evalType)?.levels||LEVELS:LEVELS;

  return <div className="main">
    <h1 className="section-title">Indicator Selector</h1>
    <p className="section-subtitle">Guided selection based on your evaluation context</p>
    <div className="wizard-progress">
      {['Programme Context','Evaluation Purpose','Donor Framework','Results Preview'].map((label,i)=>{
        const n=i+1;
        return <button key={n} className={`wizard-step-indicator${step===n?' active':''}${step>n?' done':''}`} onClick={()=>setStep(n)}>
          <span className="step-num">{n}.</span>{label}
        </button>;
      })}
    </div>

    {step===1&&<div>
      <h2 style={{fontSize:16,color:'var(--off-white)',fontWeight:700,marginBottom:12}}>Select Sector(s)</h2>
      <div className="sector-cards">
        {allSectors.map(s=><button key={s} className={`sector-card${selSectors.includes(s)?' selected':''}`} onClick={()=>toggleSector(s)}>
          <div className="sector-card-name" style={{color:SECTOR_COLORS[s]}}>{s}</div>
          <div className="sector-card-count">{sectorCounts[s]} indicators</div>
        </button>)}
      </div>
      {selSectors.length>0&&<div style={{marginTop:20}}>
        <h2 style={{fontSize:16,color:'var(--off-white)',fontWeight:700,marginBottom:12}}>Select Subsector(s) <span style={{fontWeight:400,fontSize:13,color:'var(--slate)'}}>(optional)</span></h2>
        <div className="filter-pills">
          {Object.entries(subsForSectors).sort((a,b)=>a[0].localeCompare(b[0])).map(([sub,cnt])=>
            <button key={sub} className={`filter-pill${selSubs.includes(sub)?' active':''}`} onClick={()=>toggleSub(sub)}>
              {sub}<span className="cnt">({cnt})</span>
            </button>
          )}
        </div>
      </div>}
    </div>}

    {step===2&&<div>
      <h2 style={{fontSize:16,color:'var(--off-white)',fontWeight:700,marginBottom:12}}>What type of evaluation?</h2>
      <div className="eval-cards">
        {EVAL_TYPES.map(e=><button key={e.name} className={`eval-card${evalType===e.name?' selected':''}`} onClick={()=>setEvalType(evalType===e.name?null:e.name)}>
          <div className="eval-card-name">{e.name}</div>
          <div className="eval-card-desc">{e.desc}</div>
          <div style={{marginTop:8,display:'flex',gap:4}}>
            {e.levels.map(l=><span key={l} className={`level-badge level-${l.toLowerCase()}`} style={{fontSize:9}}>{l}</span>)}
          </div>
        </button>)}
      </div>
    </div>}

    {step===3&&<div>
      <h2 style={{fontSize:16,color:'var(--off-white)',fontWeight:700,marginBottom:12}}>Donor / Reporting Framework(s)</h2>
      <div className="filter-pills">
        {allFrameworks.map(f=>{
          const cnt=wizardResults.filter(i=>splitField(i.fw).includes(f)).length;
          return <button key={f} className={`filter-pill${selFrameworks.includes(f)?' active':''}`} onClick={()=>toggleFw(f)}>
            {f}<span className="cnt">({cnt})</span>
          </button>;
        })}
      </div>
    </div>}

    {step===4&&<div>
      <h2 style={{fontSize:16,color:'var(--off-white)',fontWeight:700,marginBottom:12}}>
        Results Preview <span style={{fontWeight:400,fontSize:13,color:'var(--slate)'}}>({wizardResults.length} indicators)</span>
      </h2>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:16}}>
        {LEVELS.map(l=><span key={l} style={{fontSize:13,color:LEVEL_COLORS[l],fontWeight:600}}>
          {resultsByLevel[l].length} {l}
        </span>)}
        <button className="btn btn-teal btn-sm" style={{marginLeft:'auto'}} onClick={()=>{
          wizardResults.forEach(i=>{if(!basket.includes(i.id))onAdd(i.id)});
        }}><IconPlus/> Add all {wizardResults.length} to Framework</button>
      </div>
      {LEVELS.filter(l=>resultsByLevel[l].length>0).map(l=><div key={l} className="wizard-level-group">
        <div className="wizard-level-title">
          <span className="level-dot" style={{background:LEVEL_COLORS[l]}}></span>
          {l} <span style={{fontWeight:400,color:'var(--slate)',fontSize:13}}>({resultsByLevel[l].length})</span>
          {!emphLevels.includes(l)&&<span style={{fontSize:11,color:'var(--slate)',fontStyle:'italic',marginLeft:8}}>not emphasised for {evalType}</span>}
          <button className="wizard-add-all" onClick={()=>resultsByLevel[l].forEach(i=>{if(!basket.includes(i.id))onAdd(i.id)})}>+ Add all {l}</button>
        </div>
        {resultsByLevel[l].map(ind=><div key={ind.id} className="indicator-row" style={{marginBottom:4}}>
          <div className="indicator-summary" style={{padding:'8px 12px'}}>
            <span className="id-badge" style={{background:SECTOR_COLORS[ind.s]+'20',color:SECTOR_COLORS[ind.s]}}>{ind.id}</span>
            <span className={`level-badge level-${ind.l.toLowerCase()}`}>{ind.l}</span>
            <span className="indicator-name" style={{fontSize:12}}>{ind.n}</span>
            {ind.rec&&<span className="rec-badge">Recommended</span>}
            {basket.includes(ind.id)
              ?<button className="btn btn-coral btn-sm" onClick={e=>{e.stopPropagation();onRemove(ind.id)}} style={{marginLeft:'auto'}}><IconCheck/> Added</button>
              :<button className="btn btn-teal btn-sm" onClick={e=>{e.stopPropagation();onAdd(ind.id)}} style={{marginLeft:'auto'}}><IconPlus/> Add</button>
            }
          </div>
        </div>)}
      </div>)}
    </div>}

    <div className="wizard-nav no-print">
      {step>1&&<button className="btn btn-outline" onClick={()=>setStep(step-1)}>Back</button>}
      {step<4&&<button className="btn btn-teal" style={{marginLeft:'auto'}} onClick={()=>setStep(step+1)}>
        {step===1&&!selSectors.length?'Skip to Step '+(step+1):'Continue'}
      </button>}
      {step===4&&basket.length>0&&<button className="btn btn-teal" style={{marginLeft:'auto'}} onClick={()=>setActiveTab('framework')}>
        Go to Framework ({basket.length})
      </button>}
    </div>
  </div>;
}

/* ── Browse View ── */
function BrowseView({basket,onAdd,onRemove}){
  const[query,setQuery]=useState('');
  const[debouncedQuery,setDQ]=useState('');
  const[filtersOpen,setFiltersOpen]=useState(false);
  const[fSector,setFSector]=useState([]);
  const[fSub,setFSub]=useState([]);
  const[fLevel,setFLevel]=useState([]);
  const[fFramework,setFFw]=useState([]);
  const[fSource,setFSrc]=useState([]);
  const[fFreq,setFFreq]=useState([]);
  const[expanded,setExpanded]=useState({});
  const[page,setPage]=useState(1);
  const searchRef=useRef(null);

  useEffect(()=>{const t=setTimeout(()=>setDQ(query),200);return()=>clearTimeout(t)},[query]);
  useEffect(()=>setPage(1),[debouncedQuery,fSector,fSub,fLevel,fFramework,fSource,fFreq]);

  const activeFilterCount=[fSector,fSub,fLevel,fFramework,fSource,fFreq].reduce((a,f)=>a+f.length,0);

  const filtered=useMemo(()=>{
    return DB.filter(i=>{
      if(!matchesSearch(i,debouncedQuery))return false;
      if(fSector.length&&!fSector.includes(i.s))return false;
      if(fSub.length&&!fSub.includes(i.sub))return false;
      if(fLevel.length&&!fLevel.includes(i.l))return false;
      if(fFramework.length){const fw=splitField(i.fw);if(!fFramework.some(f=>fw.includes(f)))return false}
      if(fSource.length){const sr=splitField(i.src);if(!fSource.some(s=>sr.includes(s)))return false}
      if(fFreq.length&&!fFreq.includes(i.f))return false;
      return true;
    });
  },[debouncedQuery,fSector,fSub,fLevel,fFramework,fSource,fFreq]);

  const sectorCounts=useMemo(()=>countBy(filtered,'s'),[filtered]);
  const subCounts=useMemo(()=>countBy(filtered,'sub'),[filtered]);
  const levelCounts=useMemo(()=>countBy(filtered,'l'),[filtered]);
  const fwCounts=useMemo(()=>countBy(filtered,i=>splitField(i.fw)),[filtered]);
  const srcCounts=useMemo(()=>countBy(filtered,i=>splitField(i.src)),[filtered]);
  const freqCounts=useMemo(()=>countBy(filtered,'f'),[filtered]);

  const availableSubs=useMemo(()=>{
    if(!fSector.length)return[...new Set(DB.map(i=>i.sub))].sort();
    return[...new Set(DB.filter(i=>fSector.includes(i.s)).map(i=>i.sub))].sort();
  },[fSector]);

  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  const pageItems=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);

  // Group by subsector
  const grouped=useMemo(()=>{
    const g=[];let currentSub=null;
    pageItems.forEach(i=>{
      if(i.sub!==currentSub){
        currentSub=i.sub;
        const subCount=filtered.filter(x=>x.sub===i.sub).length;
        g.push({type:'header',sub:i.sub,count:subCount,sector:i.s});
      }
      g.push({type:'indicator',ind:i});
    });
    return g;
  },[pageItems,filtered]);

  const toggle=(k,v,set)=>set(prev=>prev.includes(v)?prev.filter(x=>x!==v):[...prev,v]);
  const clearAll=()=>{setFSector([]);setFSub([]);setFLevel([]);setFFw([]);setFSrc([]);setFFreq([])};

  return <div className="main">
    <h1 className="section-title">Browse Indicators</h1>
    <p className="section-subtitle">{DB.length} indicators across {allSectors.length} sectors</p>

    <div className="search-wrap">
      <span className="search-icon"><IconSearch/></span>
      <input ref={searchRef} className="search-input" placeholder="Search indicators by name, ID, definition, instruments..." value={query} onChange={e=>setQuery(e.target.value)}/>
      <span className="search-shortcut">Ctrl+K</span>
    </div>

    <div className="filter-bar no-print">
      <button className="filter-toggle" onClick={()=>setFiltersOpen(!filtersOpen)}>
        <IconFilter/> Filters
        {activeFilterCount>0&&<span className="filter-active-count">{activeFilterCount}</span>}
      </button>
      {activeFilterCount>0&&<button className="filter-clear" onClick={clearAll}>Clear all</button>}
    </div>

    {filtersOpen&&<div className="filter-panel">
      {/* Close button for mobile overlay */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontWeight:700,color:'var(--off-white)',fontSize:14}}>Filters</span>
        <button className="btn btn-outline btn-sm" onClick={()=>setFiltersOpen(false)}><IconX/> Close</button>
      </div>
      <div className="filter-section">
        <div className="filter-label">Sector</div>
        <div className="filter-pills">{allSectors.map(s=>
          <button key={s} className={`filter-pill${fSector.includes(s)?' active':''}`} onClick={()=>toggle('sector',s,setFSector)}>
            {s}<span className="cnt">({sectorCounts[s]||0})</span>
          </button>
        )}</div>
      </div>
      {availableSubs.length>0&&<div className="filter-section">
        <div className="filter-label">Subsector</div>
        <div className="filter-pills">{availableSubs.map(s=>
          <button key={s} className={`filter-pill${fSub.includes(s)?' active':''}`} onClick={()=>toggle('sub',s,setFSub)}>
            {s}<span className="cnt">({subCounts[s]||0})</span>
          </button>
        )}</div>
      </div>}
      <div className="filter-section">
        <div className="filter-label">Level</div>
        <div className="filter-pills">{LEVELS.map(l=>
          <button key={l} className={`filter-pill${fLevel.includes(l)?' active':''}`} onClick={()=>toggle('level',l,setFLevel)}>
            {l}<span className="cnt">({levelCounts[l]||0})</span>
          </button>
        )}</div>
      </div>
      <div className="filter-section">
        <div className="filter-label">Framework</div>
        <div className="filter-pills">{allFrameworks.map(f=>
          <button key={f} className={`filter-pill${fFramework.includes(f)?' active':''}`} onClick={()=>toggle('fw',f,setFFw)}>
            {f}<span className="cnt">({fwCounts[f]||0})</span>
          </button>
        )}</div>
      </div>
      <div className="filter-section">
        <div className="filter-label">Data Source</div>
        <div className="filter-pills">{allSources.map(s=>
          <button key={s} className={`filter-pill${fSource.includes(s)?' active':''}`} onClick={()=>toggle('src',s,setFSrc)}>
            {s}<span className="cnt">({srcCounts[s]||0})</span>
          </button>
        )}</div>
      </div>
      <div className="filter-section">
        <div className="filter-label">Frequency</div>
        <div className="filter-pills">{allFrequencies.map(f=>
          <button key={f} className={`filter-pill${fFreq.includes(f)?' active':''}`} onClick={()=>toggle('freq',f,setFFreq)}>
            {f}<span className="cnt">({freqCounts[f]||0})</span>
          </button>
        )}</div>
      </div>
    </div>}

    <div className="results-count">Showing <strong>{Math.min((page-1)*PER_PAGE+1,filtered.length)}-{Math.min(page*PER_PAGE,filtered.length)}</strong> of <strong>{filtered.length}</strong> indicators</div>

    <div>
      {grouped.map((item,idx)=>{
        if(item.type==='header')return <div key={'h-'+item.sub+idx} className="subsector-header">
          {item.sub} <span className="sub-count">({item.count} indicators)</span>
        </div>;
        const ind=item.ind;
        return <IndicatorCard key={ind.id} ind={ind} expanded={!!expanded[ind.id]}
          onToggle={()=>setExpanded(prev=>({...prev,[ind.id]:!prev[ind.id]}))}
          inBasket={basket.includes(ind.id)}
          onAdd={onAdd} onRemove={onRemove}
          searchQuery={debouncedQuery}/>;
      })}
    </div>

    {totalPages>1&&<div className="pagination">
      <button className="page-btn" disabled={page<=1} onClick={()=>setPage(page-1)}>Prev</button>
      {Array.from({length:Math.min(totalPages,7)},(_, i)=>{
        let p;
        if(totalPages<=7)p=i+1;
        else if(page<=4)p=i+1;
        else if(page>=totalPages-3)p=totalPages-6+i;
        else p=page-3+i;
        return <button key={p} className={`page-btn${page===p?' active':''}`} onClick={()=>setPage(p)}>{p}</button>;
      })}
      <button className="page-btn" disabled={page>=totalPages} onClick={()=>setPage(page+1)}>Next</button>
      <span className="page-info">Page {page} of {totalPages}</span>
    </div>}
  </div>;
}

/* ── Framework View ── */
function FrameworkView({basket,onRemove,onClearBasket,setActiveTab}){
  const saved=useRef(loadState());
  const[goalText,setGoalText]=useState(saved.current?.goalText||'');
  const[statements,setStatements]=useState(saved.current?.statements||{Outcome:'',Output:''});
  const[assumptions,setAssumptions]=useState(saved.current?.assumptions||{Impact:'',Outcome:'',Output:'',Process:''});
  const[bt,setBt]=useState(saved.current?.bt||{});
  const[dragId,setDragId]=useState(null);
  const[dragOverLevel,setDragOverLevel]=useState(null);
  const[dragOverIdx,setDragOverIdx]=useState(null);
  const[levelOverrides,setLevelOverrides]=useState(saved.current?.levelOverrides||{});
  const[toast,setToast]=useState('');

  // Save to localStorage on changes
  useEffect(()=>{
    saveState({goalText,statements,assumptions,bt,levelOverrides});
  },[goalText,statements,assumptions,bt,levelOverrides]);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2500)};

  const basketIndicators=useMemo(()=>basket.map(id=>DB.find(i=>i.id===id)).filter(Boolean),[basket]);
  const byLevel=useMemo(()=>{
    const m={Impact:[],Outcome:[],Output:[],Process:[]};
    basketIndicators.forEach(i=>{
      const effectiveLevel=levelOverrides[i.id]||i.l;
      if(m[effectiveLevel])m[effectiveLevel].push(i);
    });
    return m;
  },[basketIndicators,levelOverrides]);

  const handleDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed='move'};
  const handleDragOver=(e,level,idx)=>{e.preventDefault();setDragOverLevel(level);setDragOverIdx(idx)};
  const handleDrop=(e,targetLevel)=>{
    e.preventDefault();
    if(dragId){
      setLevelOverrides(prev=>({...prev,[dragId]:targetLevel}));
    }
    setDragId(null);setDragOverLevel(null);setDragOverIdx(null);
  };
  const handleDragEnd=()=>{setDragId(null);setDragOverLevel(null);setDragOverIdx(null)};

  const setBtVal=(id,field,val)=>setBt(prev=>({...prev,[id]:{...prev[id],[field]:val}}));

  // Export: Logframe CSV
  const exportLogframe=()=>{
    const rows=[];
    rows.push(['Programme Goal',goalText,'','','','','','','','']);
    LEVELS.forEach(l=>{
      if(l==='Outcome'||l==='Output'){
        rows.push([l+' Statement',statements[l]||'','','','','','','','','']);
      }
      rows.push([l+' Assumptions',assumptions[l]||'','','','','','','','','']);
      byLevel[l].forEach((ind,idx)=>{
        rows.push([l,ind.id,ind.n,ind.d,ind.u,ind.src,ind.tools,ind.f,bt[ind.id]?.baseline||'',bt[ind.id]?.target||'']);
      });
    });
    const csv=generateCSV(['Level/Section','ID','Indicator','Definition','Unit','Data Source','Instrument','Frequency','Baseline','Target'],rows);
    downloadCSV('logframe-'+new Date().toISOString().slice(0,10)+'.csv',csv);
    showToast('Logframe CSV downloaded');
  };

  // Export: Full metadata CSV
  const exportFull=()=>{
    const rows=basketIndicators.map(i=>[i.id,i.s,i.sub,i.n,i.d,i.num,i.den,i.u,levelOverrides[i.id]||i.l,i.f,i.dis,i.fw,i.src,i.tools,i.notes]);
    const csv=generateCSV(['ID','Sector','Subsector','Name','Definition','Numerator','Denominator','Unit','Level','Frequency','Disaggregation','Frameworks','Sources','Instruments','Notes'],rows);
    downloadCSV('indicators-full-'+new Date().toISOString().slice(0,10)+'.csv',csv);
    showToast('Full metadata CSV downloaded');
  };

  // Copy share link
  const copyShareLink=()=>{
    const link=encodeShareLink(basket,goalText);
    navigator.clipboard.writeText(link).then(()=>showToast('Share link copied!')).catch(()=>showToast('Failed to copy'));
  };

  if(basket.length===0){
    return <div className="main">
      <div className="fw-empty">
        <div className="fw-empty-title">Your Results Framework is Empty</div>
        <div className="fw-empty-text">
          Use the <strong>Selector</strong> wizard or <strong>Browse</strong> tab to find indicators and add them to your framework. Selected indicators will appear here as a structured results framework.
        </div>
        <div style={{marginTop:20,display:'flex',gap:10,justifyContent:'center'}}>
          <button className="btn btn-teal" onClick={()=>setActiveTab('wizard')}><IconWand style={{width:14,height:14}}/> Start Selector</button>
          <button className="btn btn-outline" onClick={()=>setActiveTab('browse')}><IconGrid style={{width:14,height:14}}/> Browse All</button>
        </div>
      </div>
      <Toast message={toast}/>
    </div>;
  }

  return <div className="main">
    <h1 className="section-title">Results Framework</h1>
    <p className="section-subtitle">{basket.length} indicators selected — drag to reorder or move between levels</p>

    <div className="fw-section">
      <div className="fw-section-title">Programme Goal</div>
      <textarea className="fw-editable" rows="2" placeholder="Enter your programme goal statement..." value={goalText} onChange={e=>setGoalText(e.target.value)}/>
    </div>

    {LEVELS.map(level=>{
      const items=byLevel[level];
      const showStatement=level==='Outcome'||level==='Output';
      return <div key={level} className="fw-section" onDragOver={e=>handleDragOver(e,level,-1)} onDrop={e=>handleDrop(e,level)}>
        <div className="fw-section-title">
          <span className="level-dot" style={{background:LEVEL_COLORS[level]}}></span>
          {level} Level
          <span style={{fontWeight:400,color:'var(--slate)',fontSize:13,marginLeft:4}}>({items.length} indicators)</span>
        </div>
        {showStatement&&<div style={{marginBottom:10}}>
          <textarea className="fw-editable" rows="2" placeholder={`Enter ${level.toLowerCase()} statement...`}
            value={statements[level]||''} onChange={e=>setStatements(prev=>({...prev,[level]:e.target.value}))}/>
        </div>}
        {items.length>0&&<div className="fw-table-wrap">
          <table className="fw-table">
            <thead><tr>
              <th style={{width:30}}></th>
              <th>#</th>
              <th>Indicator</th>
              <th>Definition</th>
              <th>Unit</th>
              <th>Source</th>
              <th>Instrument</th>
              <th>Frequency</th>
              <th>Disagg.</th>
              <th>Baseline</th>
              <th>Target</th>
              <th></th>
            </tr></thead>
            <tbody>
              {items.map((ind,idx)=><tr key={ind.id}
                draggable onDragStart={e=>handleDragStart(e,ind.id)} onDragEnd={handleDragEnd}
                onDragOver={e=>handleDragOver(e,level,idx)} onDrop={e=>handleDrop(e,level)}
                className={dragOverLevel===level&&dragOverIdx===idx?'drag-over':''}
                style={{opacity:dragId===ind.id?0.4:1}}>
                <td><span className="drag-handle"><IconDrag/></span></td>
                <td><span className="id-badge" style={{background:SECTOR_COLORS[ind.s]+'20',color:SECTOR_COLORS[ind.s],fontSize:10}}>{ind.id}</span></td>
                <td style={{fontWeight:500,maxWidth:200}}>{ind.n}</td>
                <td style={{maxWidth:250,fontSize:11,color:'var(--slate)'}}>{ind.d.length>120?ind.d.slice(0,120)+'…':ind.d}</td>
                <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{ind.u}</td>
                <td style={{fontSize:11}}>{ind.src}</td>
                <td style={{fontSize:11,maxWidth:180}}>{ind.tools.length>80?ind.tools.slice(0,80)+'…':ind.tools}</td>
                <td style={{fontSize:11,whiteSpace:'nowrap'}}>{ind.f}</td>
                <td style={{fontSize:11}}>{ind.dis}</td>
                <td><input placeholder="—" value={bt[ind.id]?.baseline||''} onChange={e=>setBtVal(ind.id,'baseline',e.target.value)}/></td>
                <td><input placeholder="—" value={bt[ind.id]?.target||''} onChange={e=>setBtVal(ind.id,'target',e.target.value)}/></td>
                <td><button className="btn btn-coral btn-sm" onClick={()=>onRemove(ind.id)} title="Remove"><IconX/></button></td>
              </tr>)}
            </tbody>
          </table>
        </div>}
        {items.length===0&&<div style={{padding:'12px 0',color:'var(--slate)',fontSize:13,fontStyle:'italic'}}>
          Drag indicators here or add {level.toLowerCase()}-level indicators from Browse/Selector
        </div>}
        <div style={{marginTop:8}}>
          <div className="detail-label" style={{marginBottom:4}}>Assumptions</div>
          <textarea className="fw-editable" rows="2" placeholder={`What must hold true for ${level.toLowerCase()}-level results to be achieved?`}
            value={assumptions[level]||''} onChange={e=>setAssumptions(prev=>({...prev,[level]:e.target.value}))}/>
        </div>
      </div>;
    })}

    <div className="export-bar no-print">
      <button className="btn btn-teal" onClick={exportLogframe}><IconDownload/> Logframe CSV</button>
      <button className="btn btn-outline" onClick={exportFull}><IconDownload/> Full Metadata CSV</button>
      <button className="btn btn-outline" onClick={()=>window.print()}><IconPrint/> Print / PDF</button>
      <button className="btn btn-outline" onClick={copyShareLink}><IconLink/> Copy Share Link</button>
      <button className="btn btn-coral" style={{marginLeft:'auto'}} onClick={onClearBasket}><IconTrash/> Clear All</button>
    </div>
    <Toast message={toast}/>
  </div>;
}

/* ── App ── */
function App(){
  const[activeTab,setActiveTab]=useState('wizard');
  const[basket,setBasket]=useState([]);
  const[toast,setToast]=useState('');

  // Load from localStorage or URL hash on mount
  useEffect(()=>{
    const shared=decodeShareLink();
    if(shared&&shared.b&&shared.b.length>0){
      setBasket(shared.b);
      setActiveTab('framework');
      window.location.hash='';
      return;
    }
    const saved=loadState();
    if(saved&&saved.basket){
      setBasket(saved.basket);
    }
  },[]);

  // Persist basket
  useEffect(()=>{
    const prev=loadState()||{};
    saveState({...prev,basket});
  },[basket]);

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){
        e.preventDefault();
        setActiveTab('browse');
        setTimeout(()=>{const el=document.querySelector('.search-input');if(el)el.focus()},100);
      }
      if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)){
        e.preventDefault();
        setActiveTab('browse');
        setTimeout(()=>{const el=document.querySelector('.search-input');if(el)el.focus()},100);
      }
      if(e.key==='Escape'){
        const panels=document.querySelectorAll('.filter-panel');
        if(panels.length)setActiveTab(activeTab);
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[activeTab]);

  // beforeunload warning
  useEffect(()=>{
    const handler=(e)=>{
      if(basket.length>0){e.preventDefault();e.returnValue=''}
    };
    window.addEventListener('beforeunload',handler);
    return()=>window.removeEventListener('beforeunload',handler);
  },[basket]);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(''),2500)};

  const addToBasket=useCallback((id)=>{
    setBasket(prev=>{
      if(prev.includes(id))return prev;
      showToast('Added to framework');
      return[...prev,id];
    });
  },[]);

  const removeFromBasket=useCallback((id)=>{
    setBasket(prev=>prev.filter(x=>x!==id));
    showToast('Removed from framework');
  },[]);

  const clearBasket=useCallback(()=>{
    if(window.confirm('Remove all indicators from your framework?')){
      setBasket([]);
      showToast('Framework cleared');
    }
  },[]);

  return <>
    <TopBar activeTab={activeTab} setActiveTab={setActiveTab} basketCount={basket.length}/>
    {activeTab==='wizard'&&<WizardView basket={basket} onAdd={addToBasket} onRemove={removeFromBasket} setActiveTab={setActiveTab}/>}
    {activeTab==='browse'&&<BrowseView basket={basket} onAdd={addToBasket} onRemove={removeFromBasket}/>}
    {activeTab==='framework'&&<FrameworkView basket={basket} onRemove={removeFromBasket} onClearBasket={clearBasket} setActiveTab={setActiveTab}/>}
    <MobileTabBar activeTab={activeTab} setActiveTab={setActiveTab} basketCount={basket.length}/>
    <Toast message={toast}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

S","tools":"DHS-8: v404 (currently breastfeeding); MICS6: BD module; WHO IYCF Guide (2021)","notes":"WHO recommends continued BF to 2 years and beyond. Declining in many settings with urbanisation. Track alongside complementary feeding indicators.","rec":false},{"id":"NUT28","s":"Nutrition","sub":"IYCF","n":"Introduction of solid/semi-solid/soft foods (6-8 months)","d":"Percentage of infants 6-8 months who received solid, semi-solid, or soft foods in the past 24 hours.","num":"Infants 6-8 months receiving solid foods","den":"Infants 6-8 months","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Wealth Quintile","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: complementary food items in 24h recall; MICS6: MN module; WHO IYCF Guide (2021)","notes":"Timeliness indicator. Late introduction (>8 months) associated with growth faltering. Early introduction (<6 months) undermines exclusive breastfeeding. Optimal window: 6 months (180 days).","rec":false},{"id":"NUT29","s":"Nutrition","sub":"IYCF","n":"Zero vegetable or fruit consumption (6-23 months)","d":"Percentage of children 6-23 months who did not consume any vegetables or fruits in the past 24 hours.","num":"Children 6-23 months with zero veg/fruit","den":"Children 6-23 months","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Wealth Quintile","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: v414-series dietary items; MICS6: MN IYCF module; WHO IYCF Guide (2021)","notes":"New in 2021 IYCF revision. Measures the floor of dietary quality. Typically 20-40% in low-income settings. Indicates complete absence of micronutrient-rich plant foods.","rec":false},{"id":"NUT30","s":"Nutrition","sub":"IYCF","n":"Bottle feeding (0-23 months)","d":"Percentage of children 0-23 months who were fed with a bottle with a nipple in the past 24 hours.","num":"Children 0-23 months bottle-fed","den":"Children 0-23 months","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural","fw":"WHO 100 Core","src":"DHS; MICS","tools":"DHS-8: v405 (used bottle with nipple); MICS6: BD7; WHO IYCF Guide (2021)","notes":"IYCF indicator. Risk factor for diarrhoea (contamination) and dental caries. WHO recommends cup feeding instead. Higher in urban and wealthier populations.","rec":false},{"id":"NUT14","s":"Nutrition","sub":"Micronutrients","n":"Anaemia prevalence in WRA","d":"Percentage of non-pregnant women 15-49 with Hb <12 g/dL","num":"Women Hb <12 g/dL","den":"Non-pregnant women 15-49 tested","u":"%","l":"Impact","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural","fw":"SDG; WHO 100 Core","src":"DHS; MICS","tools":"DHS-8 Biomarker: HemoCue 301; MICS6 Anaemia Module; WHO altitude adjustment tables; WHO VMNIS","notes":"SDG 2.2.3. WHA target: 50% reduction. >40% = severe public health problem.","rec":false},{"id":"NUT15","s":"Nutrition","sub":"Micronutrients","n":"Iodized salt coverage","d":"Percentage of households using adequately iodized salt (>=15ppm)","num":"HH with adequately iodized salt","den":"Total HH tested","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; WHO 100 Core","src":"DHS; MICS","tools":"MICS6: SI1 (rapid test); DHS-8: hv234a; Rapid iodine test kit (WYD); Titration method","notes":"WHO/UNICEF target >90% (USI). Leading preventable cause of intellectual disability.","rec":false},{"id":"NUT16","s":"Nutrition","sub":"Micronutrients","n":"Vitamin A supplementation (6-59 months, 2 doses/year)","d":"Percentage receiving 2 high-dose VAS per year","num":"Children receiving 2 VAS doses","den":"Children 6-59 months","u":"%","l":"Outcome","f":"Semi-annual","dis":"Sex; Age; Geography","fw":"WHO 100 Core","src":"DHIS2/HMIS; Admin Records","tools":"VAS campaign tally; DHIS2 Nutrition Module; UNICEF VAS monitoring; PEC survey","notes":"Shared with RMNCAH. Transition from campaigns to routine platforms.","rec":false},{"id":"NUT17","s":"Nutrition","sub":"Micronutrients","n":"MDD-W (women of reproductive age)","d":"Percentage of women 15-49 consuming >=5 of 10 food groups","num":"Women consuming >=5 groups","den":"Women 15-49","u":"%","l":"Outcome","f":"Annual","dis":"Age; Wealth Quintile; Urban/Rural","fw":"SDG","src":"Household Survey","tools":"FAO/FHI 360 MDD-W Module (10 food groups, 24h recall); FAO MDD-W Guide (2016)","notes":"Only validated proxy for micronutrient adequacy of women's diets.","rec":false},{"id":"NUT33","s":"Nutrition","sub":"Micronutrients","n":"Vitamin A deficiency prevalence (serum retinol)","d":"Percentage of children 6-59 months with serum retinol <0.70 μmol/L (adjusted for inflammation).","num":"Children with serum retinol <0.70 μmol/L","den":"Children tested","u":"%","l":"Impact","f":"3-5 years","dis":"Sex; Age; Geography","fw":"WHO 100 Core","src":"Household Survey","tools":"DHS-8 Biomarker Module (where VAD module included); Serum retinol assay (HPLC or fluorometry); CRP/AGP inflammation adjustment (BRINDA regression approach); WHO VMNIS database","notes":"WHO severity: <2% no public health problem; 2-9% mild; 10-19% moderate; >=20% severe. Inflammation adjustment essential (infection depresses retinol). Pair with VAS coverage data.","rec":false},{"id":"NUT34","s":"Nutrition","sub":"Micronutrients","n":"Folate status in women of reproductive age","d":"Percentage of WRA with RBC folate concentration <906 nmol/L (threshold associated with elevated NTD risk).","num":"WRA with RBC folate <906 nmol/L","den":"WRA tested","u":"%","l":"Impact","f":"3-5 years","dis":"Age; Geography","fw":"WHO 100 Core","src":"Household Survey","tools":"Micronutrient survey: RBC folate assay (microbiological or immunoassay); WHO Guideline on Optimal Serum and RBC Folate Concentrations in WRA; Fortification Assessment Coverage Toolkit (FACT)","notes":"NTD risk threshold. WHO recommends >=906 nmol/L RBC folate. Fortification of staple foods (flour, rice) with folic acid is the primary policy intervention. Supplement with periconceptional folic acid.","rec":false},{"id":"FS03","s":"Food Security","sub":"Coping Strategies","n":"reduced Coping Strategies Index (rCSI)","d":"Severity-weighted score of 5 food-based coping strategies (7-day recall)","num":"Sum of (frequency x weight) for 5 strategies","den":"N/A (composite 0-56)","u":"score","l":"Outcome","f":"Monthly","dis":"Sex; Geography","fw":"WFP/VAM","src":"Household Survey; Routine Monitoring","tools":"WFP rCSI Module (5 strategies, fixed weights: 1,2,1,1,3); WFP mVAM","notes":"Higher = worse. No universal threshold; compare to baseline.","rec":false},{"id":"FS04","s":"Food Security","sub":"Coping Strategies","n":"Livelihood Coping Strategies (LCS-FS)","d":"Proportion of HH by most severe livelihood strategy employed","num":"HH by severity category","den":"Total HH","u":"% by severity","l":"Outcome","f":"Quarterly","dis":"Sex; Geography","fw":"WFP/VAM","src":"Household Survey","tools":"WFP LCS-FS Module (10 strategies: stress/crisis/emergency); WFP LCSI Guidance Note","notes":"Stress: sold HH assets; Crisis: sold productive assets; Emergency: sold land/begging.","rec":false},{"id":"FS01","s":"Food Security","sub":"Food Consumption","n":"Food Consumption Score (FCS)","d":"Composite score of dietary diversity and frequency (8 groups, 7-day recall)","num":"Weighted sum of food group frequencies","den":"N/A (composite 0-112)","u":"score","l":"Outcome","f":"Quarterly","dis":"Sex; Geography; Urban/Rural; Wealth Quintile","fw":"SDG; WFP/VAM","src":"Household Survey","tools":"WFP FCS Module (8 groups x frequency x weight); WFP FCS Guidance; ODK/KoBoToolbox XLSForm; WFP mVAM","notes":"Poor 0-21; Borderline 21.5-35; Acceptable >35. Primary WFP outcome.","rec":true},{"id":"FS02","s":"Food Security","sub":"Food Consumption","n":"HDDS (Household Dietary Diversity Score)","d":"Number of food groups consumed in past 24 hours (12-group)","num":"Count of food groups","den":"N/A (0-12)","u":"score","l":"Outcome","f":"Quarterly","dis":"Sex; Geography; Wealth Quintile","fw":"WFP/VAM","src":"Household Survey","tools":"FANTA/FAO HDDS Module (12 groups, 24h recall); FAO Dietary Diversity Guide (2010)","notes":"No universal threshold. Mean <4.5 generally = poor diversity.","rec":false},{"id":"FS15","s":"Food Security","sub":"Food Consumption","n":"FCS-N (Food Consumption Score - Nutrition Quality Analysis)","d":"Sub-scores of FCS disaggregated by nutrient-rich food groups: protein-rich, vitamin A-rich, and hem iron-rich foods.","num":"Weighted consumption frequency of nutrient-specific food groups","den":"N/A (sub-scores)","u":"score (3 sub-scores)","l":"Outcome","f":"Quarterly","dis":"Sex; Geography; Urban/Rural","fw":"WFP/VAM","src":"Household Survey","tools":"WFP FCS-N Module: 3 sub-scores calculated from standard FCS data; WFP VAM FCS-N Guidance Note; Nutrient-specific food group weights","notes":"Uses same data as standard FCS but disaggregates into: protein (meat/fish/pulses/dairy), vitamin A (orange vegetables/fruits, dark leafy greens), hem iron (meat/fish/organ meat). Identifies specific nutrient gaps.","rec":false},{"id":"FS20","s":"Food Security","sub":"Food Consumption","n":"Acute food insecurity prevalence by IPC phase","d":"Percentage of analysed population in each IPC phase (1-Minimal, 2-Stressed, 3-Crisis, 4-Emergency, 5-Famine).","num":"Population per phase","den":"Total analysed population","u":"% per phase","l":"Impact","f":"Quarterly","dis":"Geography","fw":"IPC; WFP/VAM","src":"IPC Analysis","tools":"IPC Analytical Framework: convergence evidence protocol; IPC Reference Table (Phase 1-5); IPC Population Estimation Spreadsheet; Cadre Harmonisé (CH) for Sahel/West Africa","notes":"Report all 5 phases, not just Phase 3+. Phase distribution shows both severity and depth. Phase 3+ aggregation is standard for response planning but Phase 2 (Stressed) = early warning.","rec":true},{"id":"FS05","s":"Food Security","sub":"IPC/CH & CARI","n":"IPC Phase 3+ population","d":"Estimated population in IPC Crisis/Emergency/Famine","num":"Population in Phase 3+","den":"Total analysed population","u":"% or number","l":"Impact","f":"Quarterly","dis":"Geography","fw":"SPHERE; WFP/VAM","src":"IPC Analysis","tools":"IPC Analytical Framework; IPC Reference Table; IPC Population Estimation Spreadsheet; Cadre Harmonisé","notes":"Phase 5 = famine (>=20% GAM, CDR >=2/10,000/day, near-complete food access failure).","rec":false},{"id":"FS06","s":"Food Security","sub":"IPC/CH & CARI","n":"CARI classification","d":"WFP consolidated food security status by 4 categories","num":"HH by CARI category","den":"Total HH","u":"% by category","l":"Outcome","f":"Quarterly","dis":"Sex; Geography; Urban/Rural","fw":"WFP/VAM","src":"Household Survey","tools":"WFP CARI Console (Excel); WFP CARI Guidance; Requires FCS + LCS-FS + ECMEN/FES","notes":"4 categories: food secure → severely food insecure. Primary WFP outcome reporting.","rec":false},{"id":"FS07","s":"Food Security","sub":"IPC/CH & CARI","n":"Food expenditure share","d":"Proportion of total HH expenditure on food","num":"HH food expenditure","den":"Total HH expenditure","u":"%","l":"Outcome","f":"Quarterly","dis":"Geography; Urban/Rural; Wealth Quintile","fw":"WFP/VAM","src":"Household Survey","tools":"WFP Economic Vulnerability Module; WFP CARI Console; World Bank LSMS consumption module","notes":">65% = severe vulnerability (WFP); >75% = critical. Key CARI component.","rec":false},{"id":"FS14","s":"Food Security","sub":"IPC/CH & CARI","n":"Emergency food assistance coverage","d":"Percentage of targeted food-insecure population receiving assistance","num":"Beneficiaries receiving food/CBT","den":"Targeted food-insecure population","u":"%","l":"Output","f":"Monthly","dis":"Sex; Geography; Transfer modality","fw":"SPHERE; WFP/VAM","src":"Routine Monitoring; Admin Records","tools":"WFP COMET; WFP SCOPE; PDM Survey; Distribution monitoring form","notes":"SPHERE: 2,100 kcal/person/day. PDM assesses utilisation and market impact.","rec":false},{"id":"FS16","s":"Food Security","sub":"IPC/CH & CARI","n":"Essential Needs Monitoring (ECMEN)","d":"Proportion of households able to meet their essential needs, measured through expenditure relative to the Minimum Expenditure Basket (MEB).","num":"HH with total expenditure >= MEB","den":"Total HH","u":"%","l":"Outcome","f":"Quarterly","dis":"Sex; Geography; Urban/Rural","fw":"WFP/VAM","src":"Household Survey","tools":"WFP ECMEN Module: expenditure questionnaire (food, housing, health, education, transport, communication); MEB calculation methodology; WFP CARI 2021+ console: ECMEN input","notes":"Replaced Food Expenditure Share as preferred economic vulnerability indicator in CARI (2021+). MEB = minimum cost to cover essential needs. Context-specific MEB calculated per WFP country office.","rec":true},{"id":"FS17","s":"Food Security","sub":"IPC/CH & CARI","n":"Minimum Expenditure Basket (MEB) cost","d":"Monthly cost in local currency of the minimum set of goods and services required to meet a household's essential needs.","num":"Monthly cost of MEB basket","den":"N/A (monetary value)","u":"local currency","l":"Process","f":"Monthly","dis":"Geography; Urban/Rural","fw":"WFP/VAM","src":"Market Monitoring","tools":"WFP MEB Guidance Note: basket composition and calculation; Market price monitoring form; CARI Console: MEB input; Cash Working Group MEB harmonisation tool","notes":"MEB includes: food (2,100 kcal/person/day), shelter, WASH, health, education, transport, communication, energy. Used to set cash transfer values. Compare HH expenditure to MEB for ECMEN.","rec":false},{"id":"FS18","s":"Food Security","sub":"IPC/CH & CARI","n":"Crude mortality rate (as food security evidence)","d":"Deaths per 10,000 population per day from all causes.","num":"Total deaths in period","den":"Mid-period population x days","u":"per 10,000/day","l":"Impact","f":"Quarterly","dis":"Age (<5, all); Geography","fw":"SPHERE; IPC","src":"SMART Survey; Sentinel Surveillance","tools":"SMART Survey mortality module: retrospective mortality questionnaire; IPC Reference Table Phase 5 threshold (>=2/10,000/day); SPHERE emergency threshold (>=1/10,000/day all-age; >=2/10,000/day U5)","notes":"IPC Phase 5 (Famine) requires CDR >=2/10,000/day as one of 3 criteria. SMART surveys measure retrospective mortality over recall period. U5DR threshold is double the all-age threshold.","rec":false},{"id":"FS10","s":"Food Security","sub":"Livelihoods","n":"Income source diversification","d":"Average number of income sources per household","num":"Sum of distinct income sources","den":"Total HH","u":"mean count","l":"Outcome","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"UNDP; WFP/VAM","src":"Household Survey","tools":"HEA Livelihood Zone Baseline; WFP CFSVA; World Bank LSMS","notes":"Higher = greater resilience. Disaggregate on-farm, off-farm, non-farm, transfers.","rec":false},{"id":"FS11","s":"Food Security","sub":"Livelihoods","n":"Asset depletion index","d":"Proportion of HH that sold productive assets as coping strategy in past 12 months","num":"HH reporting asset sales","den":"Total HH","u":"% by type","l":"Outcome","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"WFP/VAM","src":"Household Survey","tools":"WFP LCSI (asset strategies); HEA; World Bank LSMS asset module","notes":"Crisis-level coping. Distinguish productive from non-productive assets.","rec":false},{"id":"FS12","s":"Food Security","sub":"Livelihoods","n":"Resilience capacity index","d":"Composite measure of household resilience (absorptive, adaptive, transformative capacities)","num":"Composite index score","den":"N/A (index)","u":"index","l":"Outcome","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"FAO; USAID","src":"Household Survey","tools":"FAO RIMA-II (MIMIC model, 4 pillars); USAID Resilience Measurement Module; TANGO International PRIME resilience indicators","notes":"Multiple frameworks. FAO RIMA, USAID/TANGO, DFID/FCDO 3As all distinct approaches.","rec":false},{"id":"FS13","s":"Food Security","sub":"Livelihoods","n":"WEAI (Women's Empowerment in Agriculture Index)","d":"Composite measure of women's decision-making, resource access, and time use in agriculture","num":"Alkire-Foster method across 5 domains, 10 indicators","den":"N/A (composite)","u":"index","l":"Outcome","f":"Annual","dis":"Sex; Geography","fw":"IFPRI; USAID Feed the Future","src":"Household Survey","tools":"WEAI Survey Module (IFPRI); pro-WEAI (project-level adaptation); pro-WEAI+HN (health/nutrition module)","notes":"5 domains: production decisions, resources, income, leadership, time. Pro-WEAI adds intrinsic agency.","rec":false},{"id":"FS19","s":"Food Security","sub":"Livelihoods","n":"PDM food utilisation and satisfaction","d":"Post-distribution monitoring indicators: percentage of beneficiaries consuming distributed food/using cash for food; satisfaction with assistance.","num":"Beneficiaries reporting appropriate use/satisfaction","den":"Total beneficiaries surveyed in PDM","u":"%","l":"Process","f":"Monthly","dis":"Sex; Geography; Transfer modality","fw":"WFP/VAM","src":"Routine Monitoring","tools":"WFP Standard PDM Questionnaire: utilisation, sharing, selling, satisfaction, protection sections; WFP PDM Guidance Note; ODK/KoBoToolbox PDM XLSForm","notes":"Mandatory WFP accountability indicator. Track: (1) food consumed vs. sold/shared, (2) cash/voucher used for food vs. other, (3) satisfaction with quantity/quality, (4) safety/protection concerns during distribution.","rec":false},{"id":"FS22","s":"Food Security","sub":"Livelihoods","n":"Crop production estimates","d":"Estimated crop production (tonnes) for main staple crops in the current season compared to 5-year average.","num":"Current season production estimate (tonnes)","den":"5-year average production","u":"% of average","l":"Outcome","f":"Seasonal","dis":"Crop type; Geography","fw":"WFP/VAM; FAO","src":"Admin Records","tools":"FAO GIEWS Crop Prospects: national production estimates; FEWS NET Production Estimates; National agricultural statistics (MOA); Remote sensing crop monitoring (NDVI, CHIRPS rainfall); Crop Assessment Mission reports","notes":"Primary early warning indicator for food security. Production below 80% of average signals potential crisis. Track alongside market prices, rainfall patterns, and pest/disease reports.","rec":false},{"id":"FS08","s":"Food Security","sub":"Market & Prices","n":"Terms of trade (wage to staple)","d":"Ratio of daily wage to price per kg of main staple","num":"Daily agricultural wage","den":"Price per kg main staple","u":"kg/day wage","l":"Outcome","f":"Monthly","dis":"Geography","fw":"WFP/VAM","src":"Market Monitoring","tools":"WFP Market Monitor; FEWS NET Price Bulletin; National price collection form","notes":"Declining ToT = worsening purchasing power. Compare to 5-year average.","rec":false},{"id":"FS09","s":"Food Security","sub":"Market & Prices","n":"Market Functionality Index (MFI)","d":"Composite assessment of market system capacity across 9 dimensions","num":"Weighted score across 9 dimensions","den":"N/A (composite)","u":"index","l":"Outcome","f":"Quarterly","dis":"Geography","fw":"WFP/VAM","src":"Market Monitoring","tools":"WFP MFI Survey (9 dimensions: assortment, availability, price, supply chain, competition, infrastructure, services, quality, access); EMMA","notes":"Determines appropriateness of cash/voucher vs. in-kind transfers.","rec":false},{"id":"FS21","s":"Food Security","sub":"Market & Prices","n":"Cost of a nutritious diet (CoNA/CoHD)","d":"Minimum cost per person per day to meet nutrient requirements using locally available foods.","num":"Minimum cost nutrient-adequate diet","den":"N/A (monetary value per person/day)","u":"USD/person/day","l":"Outcome","f":"Quarterly","dis":"Geography; Urban/Rural","fw":"WFP/VAM; FAO","src":"Market Monitoring","tools":"WFP Fill the Nutrient Gap (FNG) analysis tool; WFP Cost of Healthy Diets methodology; FAO/WHO nutrient requirements; Market price data for locally available foods","notes":"Compare to income/expenditure to assess affordability. Globally, a healthy diet costs ~$3.50/person/day, unaffordable for >3 billion people. Track alongside FCS for nutritional adequacy.","rec":false},{"id":"PVE14","s":"P/CVE & Governance","sub":"Governance & Accountability","n":"Citizen satisfaction with local government","d":"Percentage satisfied with local government service quality","num":"Respondents satisfied/very satisfied","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Urban/Rural; Geography","fw":"SDG; UNDP","src":"Household Survey; Community Survey","tools":"Afrobarometer R9: Q54-Q65; World Bank Governance module; SDG 16.6.2 guide; Community scorecard; VEEM Governance/Push","notes":"SDG 16.6.2. Disaggregate by service type. Weak governance = push factor for radicalisation.","rec":false},{"id":"PVE15","s":"P/CVE & Governance","sub":"Governance & Accountability","n":"Perception of corruption","d":"Percentage perceiving corruption as widespread in local institutions","num":"Respondents perceiving widespread corruption","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Geography","fw":"SDG; UNDP","src":"Household Survey","tools":"TI Global Corruption Barometer; Afrobarometer: Q47-Q53; SDG 16.5 guide; VEEM Governance Push","notes":"SDG 16.5. Corruption = primary push factor. Distinguish perception from experience.","rec":false},{"id":"PVE16","s":"P/CVE & Governance","sub":"Governance & Accountability","n":"Women's participation in peacebuilding/governance","d":"Proportion of women in local peacebuilding/governance structures","num":"Women in structures","den":"Total structure members","u":"%","l":"Outcome","f":"Annual","dis":"Age; Geography; Structure type","fw":"SDG; UNDP","src":"Community Survey; Admin Records","tools":"SDG 5.5.1 methodology; UNSCR 1325 NAP monitoring; GCERF gender indicators; USAID WPS Toolkit","notes":"UNSCR 1325. Track presence AND influence. Intersectional analysis.","rec":false},{"id":"PVE21","s":"P/CVE & Governance","sub":"Protection & GBV","n":"Intimate partner violence prevalence (past 12 months)","d":"Percentage of ever-partnered women/girls 15-49 experiencing physical/sexual IPV in past 12 months","num":"Women experiencing IPV in past 12 months","den":"Ever-partnered women 15-49","u":"%","l":"Impact","f":"Annual","dis":"Age; Geography; Wealth Quintile","fw":"SDG; WHO","src":"Household Survey","tools":"WHO VAW Survey instrument (adapted CTS); DHS Domestic Violence Module; VACS (13-24); GBV IMS","notes":"SDG 5.2.1. Strict safety and ethics protocols required. Female interviewers only. Referral pathways.","rec":false},{"id":"PVE22","s":"P/CVE & Governance","sub":"Protection & GBV","n":"Child marriage prevalence","d":"Percentage of women 20-24 married/in union before age 18","num":"Women 20-24 married <18","den":"Women 20-24 surveyed","u":"%","l":"Impact","f":"Annual","dis":"Geography; Wealth Quintile; Urban/Rural; Education","fw":"SDG","src":"DHS; MICS","tools":"DHS-8 marriage module; MICS6 marriage module; CRVS marriage registration","notes":"SDG 5.3.1. Track also <15 threshold. Leading indicator for adolescent birth rate, education dropout.","rec":false},{"id":"PVE26","s":"P/CVE & Governance","sub":"Protection & GBV","n":"FGM prevalence","d":"Percentage of girls and women aged 15-49 who have undergone female genital mutilation.","num":"Women/girls 15-49 with FGM","den":"Women/girls 15-49 surveyed","u":"%","l":"Impact","f":"Annual","dis":"Age; Geography; Ethnicity; Education","fw":"SDG; UNICEF","src":"DHS; MICS","tools":"DHS-8 FGM Module: questions on own experience and daughters; MICS6 FGM Module: FG1-FG9; UNICEF Joint Programme on FGM monitoring framework","notes":"SDG 5.3.2. Measured via self-report (own experience) and report on daughters (0-14). Track both prevalence and incidence (among youngest cohort). Distinguish FGM types (I-IV). Criminalisation status as context variable.","rec":false},{"id":"PVE27","s":"P/CVE & Governance","sub":"Protection & GBV","n":"GBV service utilisation rate","d":"Percentage of GBV survivors who accessed clinical, psychosocial, legal, and/or safety services within 72 hours of incident.","num":"GBV survivors accessing services within 72 hours","den":"Reported GBV incidents","u":"%","l":"Outcome","f":"Quarterly","dis":"Sex; Age; Service type; Geography","fw":"Humanitarian Standards; UNDP","src":"Routine Monitoring","tools":"GBV IMS (Information Management System): incident and service data; GBV Sub-Cluster minimum monitoring indicators; One-stop centre register; CMR (Clinical Management of Rape) register","notes":"72-hour window critical for: PEP (HIV), emergency contraception, STI prophylaxis, forensic evidence. Track each service type separately: clinical (medical), psychosocial (counseling), legal (reporting/legal aid), safety (shelter/safe house).","rec":false},{"id":"PVE28","s":"P/CVE & Governance","sub":"Protection & GBV","n":"Attitudes justifying intimate partner violence","d":"Percentage of women (and men) who agree that a husband is justified in beating his wife under at least one specified circumstance.","num":"Respondents agreeing with >=1 justification","den":"Total respondents","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Education; Wealth Quintile; Geography","fw":"SDG; WHO","src":"DHS; MICS","tools":"DHS-8 domestic violence attitude questions (v744a-v744e): 5 circumstances (burns food, argues, goes out without telling, neglects children, refuses sex); MICS6: AT module","notes":"Standard DHS/MICS indicator. 5 circumstances are standardised across all DHS surveys. Declining globally but still >30% of women agree in many LMICs. Proxy for social norms around GBV.","rec":true},{"id":"PVE29","s":"P/CVE & Governance","sub":"Protection & GBV","n":"Non-partner sexual violence prevalence","d":"Percentage of women aged 15-49 who experienced sexual violence by a non-partner in the past 12 months.","num":"Women experiencing non-partner sexual violence","den":"Women 15-49 surveyed","u":"%","l":"Impact","f":"Annual","dis":"Age; Geography","fw":"SDG; WHO","src":"DHS; Household Survey","tools":"WHO Multi-country Study on Women's Health and Domestic Violence: non-partner violence module; DHS domestic violence module: non-partner items; VACS (13-24): sexual violence by non-partners","notes":"SDG 5.2.2. Includes strangers, acquaintances, authority figures, armed actors. Underreported. Requires same safety and ethics protocols as IPV measurement. Often measured in VACS (adolescent population).","rec":false},{"id":"PVE01","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Perceived injustice and grievance","d":"Individual score on perceived unfair treatment by state or dominant group","num":"Mean/proportion above threshold","den":"Total respondents","u":"score or %","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP; USAID","src":"Household Survey","tools":"VEEM Push Factor; Perceived Injustice Scale (Schmitt 2010, 8 items, 6-pt Likert); UNDP Journey to Extremism instrument; Mercy Corps P/CVE instruments","notes":"VEEM push factor. Scale measures personal and group-based injustice.","rec":false},{"id":"PVE02","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Moral disengagement","d":"Score on cognitive mechanisms enabling harmful conduct","num":"Mean score","den":"N/A (continuous)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age","fw":"UNDP","src":"Household Survey","tools":"Moral Disengagement Scale (Bandura 1996, 32 items; short: Caprara 2006, 14 items); VEEM Individual Factor","notes":"8 mechanisms: moral justification, euphemistic labelling, advantageous comparison, displacement/diffusion of responsibility, distortion, dehumanisation, blame.","rec":false},{"id":"PVE03","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Quest for significance","d":"Motivation to matter and be someone of importance","num":"Mean score","den":"N/A (continuous)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age","fw":"UNDP","src":"Household Survey","tools":"Significance Quest Scale (Kruglanski 2014, 6 items, 7-pt); VEEM Pull Factor; Significance Loss Scale (Webber 2018)","notes":"3N theory. High need + significance loss + radical narrative = pathway.","rec":false},{"id":"PVE04","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Identity fusion with group","d":"Degree of visceral connection between personal and group identity","num":"Proportion scoring fused","den":"Total respondents","u":"% or mean","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity","fw":"UNDP","src":"Household Survey","tools":"Identity Fusion Scale - Pictorial (Swann 2009, 1 item); Verbal (Gomez 2011, 7 items); VEEM Pull Factor; Fighting and Dying Measure","notes":"Pictorial version is cross-culturally robust and literacy-independent.","rec":false},{"id":"PVE05","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Legitimacy of political violence (ARIS)","d":"Endorsement of violence for political/religious/social aims","num":"Respondents endorsing violence items","den":"Total respondents","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP","src":"Household Survey","tools":"ARIS (Moskalenko & McCauley 2009, 4 subscales: activism/radicalism x attitude/intention); MEMS (Stankov 2010); Vignette-based measures; VEEM Attitudinal Outcome","notes":"ARIS distinguishes legal activism from illegal radicalism. Vignettes reduce social desirability bias. Ethics mandatory.","rec":true},{"id":"PVE06","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Perceived group threat","d":"Perceived threat from other identity groups across economic, cultural, safety dimensions","num":"Mean score on threat scale","den":"N/A (continuous)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP","src":"Household Survey","tools":"Integrated Threat Theory Scale (Stephan & Stephan 2000); Perceived Group Threat Scale (Scheepers 2002); SCORE threat sub-dimension; VEEM Push Factor","notes":"Realistic threat (economic, safety) vs. symbolic threat (values, identity). Both predict prejudice.","rec":false},{"id":"PVE07","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Social exclusion and marginalisation","d":"Self-reported identity-based exclusion experiences","num":"Respondents above threshold","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP; USAID","src":"Household Survey","tools":"Social Exclusion Scale (multi-dimensional); UNDP Journey to Extremism; Horizontal Inequality Index (Stewart 2008); USAID YouthPower; VEEM Push Factor","notes":"Primary push factor. Measure perceived AND objective exclusion across economic, political, social, spatial.","rec":false},{"id":"PVE23","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Need for cognitive closure","d":"Individual tendency to desire definitive knowledge and avoid ambiguity, a vulnerability factor for rigid ideological frameworks.","num":"Mean NFCC score","den":"N/A (continuous)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age; Education","fw":"UNDP","src":"Household Survey","tools":"Need for Cognitive Closure Scale (Webster & Kruglanski 1994, original 42 items; short form: 15 items, 6-point Likert); VEEM Framework: Individual vulnerability factor","notes":"High NFCC predicts susceptibility to categorical thinking, prejudice, and extremist ideology (Kruglanski). Reverse-scored = cognitive openness. Use 15-item short form in field settings. Complementary to BRAVE-14.","rec":false},{"id":"PVE24","s":"P/CVE & Governance","sub":"Radicalisation Risk (VEEM)","n":"Social Dominance Orientation (SDO)","d":"Individual preference for group-based hierarchies and inequality between social groups.","num":"Mean SDO score","den":"N/A (continuous)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity","fw":"UNDP","src":"Household Survey","tools":"SDO Scale (Pratto et al. 1994; SDO7: Ho et al. 2015, 16 items, 7-point Likert); VEEM Framework: Individual attitudinal factor; Distinguishes SDO-D (dominance) from SDO-E (egalitarianism)","notes":"SDO predicts prejudice, support for aggressive intergroup policies, and endorsement of political violence. SDO7 (2015 revision) has two distinct subdimensions: dominance (overt support for oppression) and anti-egalitarianism (opposition to equality). α = .87-.93.","rec":false},{"id":"PVE08","s":"P/CVE & Governance","sub":"Resilience & Protective Factors","n":"BRAVE-14 resilience to VE","d":"Community resilience score based on 14 protective factors","num":"Mean BRAVE-14 score","den":"N/A (14-70)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age; Geography","fw":"UNDP","src":"Community Survey","tools":"BRAVE-14 Scale (Bhui 2014/2020, 14 items, 5-pt Likert); VEEM Resilience domain","notes":"Covers cultural identity, bridging capital, linking capital, beliefs. α = .76. Adapted for East Africa and South Asia.","rec":false},{"id":"PVE09","s":"P/CVE & Governance","sub":"Resilience & Protective Factors","n":"Critical thinking / cognitive openness","d":"Openness to alternative viewpoints, resistance to black-and-white thinking","num":"Mean score","den":"N/A (continuous)","u":"mean score","l":"Outcome","f":"Annual","dis":"Sex; Age; Education","fw":"UNDP; USAID","src":"Household Survey","tools":"Actively Open-minded Thinking Scale (Baron 2019, 7 items); Need for Cognitive Closure Scale (Webster & Kruglanski 1994, 42/15 items); VEEM Protective Factor","notes":"High NFC = risk factor. Cognitive openness = protective. Use shortened scales in field.","rec":false},{"id":"PVE10","s":"P/CVE & Governance","sub":"Resilience & Protective Factors","n":"Youth agency and civic engagement","d":"Proportion of youth 15-29 reporting meaningful civic/economic participation","num":"Youth above threshold","den":"Total youth respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Education; Geography","fw":"UNDP; USAID","src":"Household Survey; Community Survey","tools":"USAID YouthPower PYD Survey; Adolescent Connectedness Scale (Karcher 2011); VEEM Protective Factor; Mercy Corps REVIVE instruments","notes":"Agency + engagement = core protective factors. Distinguish passive from active participation.","rec":false},{"id":"PVE11","s":"P/CVE & Governance","sub":"Resilience & Protective Factors","n":"Media and information literacy","d":"Ability to critically evaluate media, identify misinformation","num":"Respondents above threshold","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Education; Geography","fw":"UNDP; USAID","src":"Household Survey","tools":"UNESCO MIL Framework; IREX Media Literacy Index; Misinformation vignettes; VEEM Protective Factor","notes":"Vignette-based measurement more valid than self-report. Include platform-specific literacy.","rec":false},{"id":"PVE25","s":"P/CVE & Governance","sub":"Resilience & Protective Factors","n":"Economic opportunity perception","d":"Self-assessed current and future economic opportunities including employment, livelihoods, and upward mobility.","num":"Respondents rating opportunities positively","den":"Total respondents","u":"% or mean score","l":"Outcome","f":"Annual","dis":"Sex; Age; Education; Geography","fw":"UNDP; USAID","src":"Household Survey","tools":"Afrobarometer: economic conditions perception (Q4a-Q4e); UNDP Journey to Extremism: economic grievance section; ILO School-to-Work Transition Survey; VEEM Push Factor: economic drivers","notes":"Perceived lack of opportunity (relative deprivation) is stronger predictor than absolute poverty. Measure perception RELATIVE TO aspirations and reference group, not just objective employment metrics.","rec":false},{"id":"PVE17","s":"P/CVE & Governance","sub":"Rule of Law & Justice","n":"Access to justice","d":"Percentage of adults with legal problem who accessed dispute resolution","num":"Adults accessing resolution","den":"Adults with legal problem in past 2 years","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Wealth Quintile; Geography","fw":"SDG; UNDP","src":"Household Survey","tools":"SDG 16.3.3 guide; WJP Rule of Law Index; HiiL Justice Needs Survey; UNDP Access to Justice Tool","notes":"Include formal AND informal mechanisms. Gender barriers critical.","rec":false},{"id":"PVE18","s":"P/CVE & Governance","sub":"Rule of Law & Justice","n":"Trust in security forces","d":"Percentage expressing trust in police and military","num":"Respondents expressing trust","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP","src":"Household Survey","tools":"Afrobarometer R9: Q43; SCORE political/institutional trust; VEEM security legitimacy; Custom trust battery","notes":"Low trust = push factor for armed group recruitment. Disaggregate police from military.","rec":false},{"id":"PVE30","s":"P/CVE & Governance","sub":"Rule of Law & Justice","n":"DDR reintegration completion","d":"Percentage of ex-combatants/ex-associates who completed reintegration programming (economic, social, psychosocial components).","num":"Ex-combatants completing reintegration","den":"Ex-combatants enrolled in DDR","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Armed group; Geography","fw":"UNDP","src":"Routine Monitoring; Admin Records","tools":"UN Integrated DDR Standards (IDDRS) monitoring framework; Reintegration programme register; Community perception survey; Economic self-sufficiency assessment; Recidivism tracking system","notes":"Track completion of all 3 pillars: economic (livelihood, employment), social (community acceptance, family reunification), psychosocial (mental health support). Recidivism rate (return to armed group) is the ultimate outcome measure.","rec":false},{"id":"PVE31","s":"P/CVE & Governance","sub":"Rule of Law & Justice","n":"Freedom of movement","d":"Percentage of population reporting no restrictions on their freedom of movement within and between communities.","num":"Respondents reporting unrestricted movement","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Geography; Population group","fw":"Humanitarian Standards; UNDP","src":"Household Survey","tools":"Global Protection Cluster: freedom of movement monitoring indicators; Protection monitoring tool; Movement intention survey; UNHCR protection indicators","notes":"Protection indicator. Restrictions include checkpoints, curfews, insecurity, documentation requirements, gender-based restrictions, disability barriers. Disaggregate by direction (within community, between, cross-border).","rec":false},{"id":"PVE12","s":"P/CVE & Governance","sub":"Social Cohesion & Trust","n":"SCORE social cohesion index","d":"Multi-dimensional index across 6 dimensions: trust, identity, participation, political trust, security, fairness","num":"Composite SCORE score","den":"N/A (0-100)","u":"index","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP","src":"Household Survey","tools":"UNDP SCORE Survey (~60 items, 5-pt Likert); SCORE Sampling Guide; Factor analysis protocol","notes":"Validated 15+ countries. 45-60 min interview. Enables between-community and over-time comparison.","rec":true},{"id":"PVE13","s":"P/CVE & Governance","sub":"Social Cohesion & Trust","n":"Intergroup contact quality/frequency","d":"Meaningful positive interactions with other identity groups","num":"Respondents reporting positive contact","den":"Total respondents","u":"% or mean","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Geography","fw":"UNDP","src":"Household Survey; Community Survey","tools":"Intergroup Contact Scale (Islam & Hewstone 1993); Allport Conditions Checklist; SCORE contact sub-dimension","notes":"Allport hypothesis. Positive contact reduces prejudice; negative can increase it. Measure both frequency AND quality.","rec":false},{"id":"PVE19","s":"P/CVE & Governance","sub":"Social Cohesion & Trust","n":"Direct exposure to violence","d":"Proportion reporting direct violence exposure in past 12 months","num":"Respondents reporting exposure","den":"Total respondents","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Violence type; Geography","fw":"SDG; UNDP","src":"Household Survey","tools":"WHO VAW/VAM Survey; SDG 16.1.3; Harvard Trauma Questionnaire; Conflict Experiences Scale; ACLED/UCDP data","notes":"Both outcome and risk factor. Distinguish types. Ethics mandatory.","rec":false},{"id":"PVE20","s":"P/CVE & Governance","sub":"Social Cohesion & Trust","n":"Community safety perception","d":"Percentage feeling safe walking in community at night","num":"Respondents feeling safe","den":"Total respondents","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Age; Ethnicity; Urban/Rural","fw":"SDG; UNDP","src":"Household Survey; Community Survey","tools":"Afrobarometer: Q8-Q10; SCORE security dimension; SDG 16.1.4; UNDP Community Security Survey","notes":"SDG 16.1.4. Distinguish perceived safety from direct victimisation. Gender-disaggregated critical.","rec":false},{"id":"PVE32","s":"P/CVE & Governance","sub":"Social Cohesion & Trust","n":"Accountability to affected populations (AAP)","d":"Percentage of affected population who are aware of, and have used, available feedback and complaint mechanisms.","num":"Affected population aware of CFM AND able to use it","den":"Total affected population surveyed","u":"%","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography; Population group","fw":"Humanitarian Standards","src":"Routine Monitoring; Household Survey","tools":"IASC AAP Framework: monitoring indicators; CHS Alliance AAP Checklist; Community perception survey; CFM utilisation register; Complaint resolution tracking database","notes":"Core Humanitarian Standard commitment 4 and 5. Track: (1) awareness of mechanisms, (2) perception that feedback is safe, (3) actual utilisation rate, (4) satisfaction with response, (5) resolution time.","rec":false}

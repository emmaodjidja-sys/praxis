ement","d":"Hectares of land, forest, watershed, or coastal areas under improved climate-resilient management practices.","num":"Hectares under improved management","den":"N/A","u":"hectares","l":"Output","f":"Annual","dis":"Ecosystem type; Geography","fw":"GCF/AF; SDG","src":"Admin Records; Routine Monitoring","tools":"GCF Results Measurement Framework: Indicator A3.0; Land management assessment protocol; Satellite/remote sensing for land cover change; Community-based natural resource management monitoring forms","notes":"Includes: sustainable forest management, watershed rehabilitation, mangrove restoration, rangeland management, soil conservation. Track alongside biodiversity indicators and ecosystem service valuation.","rec":false},{"id":"CLI06","s":"Climate & Environment","sub":"DRR","n":"EWS population coverage","d":"Percentage in disaster-prone areas with multi-hazard EWS access and response capacity","num":"Population with EWS access + capacity","den":"Population in disaster-prone areas","u":"%","l":"Output","f":"Annual","dis":"Sex; Geography; Urban/Rural","fw":"SDG; Sendai Framework","src":"Household Survey; Admin Records","tools":"UNDRR EWS Checklist (4 elements); Sendai Framework Monitor; SDG 13.1.2 guide","notes":"Access must include understanding AND capacity to act. Measure all 4 EWS elements.","rec":true},{"id":"CLI07","s":"Climate & Environment","sub":"DRR","n":"Disaster mortality rate","d":"Deaths and missing from climate-related disasters per 100,000","num":"Deaths + missing","den":"Population","u":"per 100,000","l":"Impact","f":"Annual","dis":"Geography; Disaster type","fw":"SDG; Sendai Framework","src":"Admin Records","tools":"Sendai Framework Monitor; DesInventar Sendai; CRED EM-DAT database; OCHA Flash Updates","notes":"SDG 1.5.1 / Sendai Target A. Track alongside economic losses (Target C).","rec":false},{"id":"CLI08","s":"Climate & Environment","sub":"DRR","n":"Climate displacement","d":"People internally displaced by climate-related disasters","num":"New displacements from climate events","den":"N/A","u":"number","l":"Impact","f":"Annual","dis":"Disaster type; Geography; Sex","fw":"SDG","src":"Admin Records","tools":"IDMC Global Database; IOM DTM; National disaster authority reports; DesInventar Sendai; OCHA HNO","notes":"Distinguish disaster from conflict displacement. Climate attribution complex.","rec":false},{"id":"CLI14","s":"Climate & Environment","sub":"DRR","n":"Sendai Target B: People affected by disasters","d":"Number of people directly affected by disasters per 100,000 population (injured, ill, displaced, evacuated, with damaged housing, livelihoods disrupted).","num":"People directly affected","den":"Population (per 100,000)","u":"per 100,000","l":"Impact","f":"Annual","dis":"Disaster type; Sex; Geography","fw":"Sendai Framework; SDG","src":"Admin Records","tools":"Sendai Framework Monitor: Target B indicators (B-2 through B-5: injured, ill, displaced/evacuated, dwellings damaged, livelihoods disrupted); DesInventar Sendai; National disaster damage and loss database","notes":"SDG 1.5.1 / 13.1.1. Disaggregate by sub-indicator: injured, homeless, displaced, livelihoods disrupted. Each counted separately (not additive). Compare to 2015-2030 baseline for progress assessment.","rec":false},{"id":"CLI15","s":"Climate & Environment","sub":"DRR","n":"Sendai Target C: Direct economic losses from disasters","d":"Direct economic losses from disasters as a proportion of GDP.","num":"Direct economic losses (USD)","den":"GDP","u":"%","l":"Impact","f":"Annual","dis":"Disaster type; Sector; Geography","fw":"Sendai Framework; SDG","src":"Admin Records","tools":"Sendai Framework Monitor: Target C indicators (C-1 through C-6: agriculture, productive assets, housing, critical infrastructure, cultural heritage, other); DesInventar Sendai; Post-Disaster Needs Assessment (PDNA) methodology","notes":"SDG 1.5.2 / 11.5.2. Disaggregate by sector: agriculture, productive assets, housing, critical infrastructure. Excludes indirect losses (multiplier effects, opportunity costs). PDNA methodology for comprehensive post-disaster assessment.","rec":false},{"id":"CLI16","s":"Climate & Environment","sub":"DRR","n":"Schools and health facilities damaged by disasters","d":"Number of educational and health facilities damaged or destroyed by disasters per year.","num":"Facilities damaged/destroyed","den":"N/A (count) or per 100,000 population","u":"number","l":"Impact","f":"Annual","dis":"Facility type (school/HCF); Damage level; Geography","fw":"Sendai Framework; SDG","src":"Admin Records","tools":"Sendai Framework Monitor: Target D indicators (D-2, D-3: damaged educational and health facilities); DesInventar Sendai; Facility damage assessment form (rapid and detailed); Education/Health Cluster damage reports","notes":"Sendai Target D. Measures infrastructure vulnerability. Track alongside service disruption duration and recovery time. Informs resilient reconstruction standards.","rec":false},{"id":"CLI09","s":"Climate & Environment","sub":"Environmental Health","n":"Clean cooking fuel use","d":"Percentage of HH primarily using clean fuels for cooking","num":"HH using clean fuels","den":"Total HH","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Wealth Quintile; Geography","fw":"SDG; WHO 100 Core","src":"DHS; MICS; Household Survey","tools":"DHS-8: hv226; MICS6: HC6; WHO HH Energy Survey Module; SDG 7.1.2 methodology","notes":"SDG 7.1.2. WHO tier classification. 2.4 billion on solid fuels. Health-climate co-benefit.","rec":false},{"id":"CLI10","s":"Climate & Environment","sub":"Environmental Health","n":"Forest cover change","d":"Annual rate of change in forest area","num":"Forest area change (hectares/year)","den":"Total forest area at baseline","u":"% change/year","l":"Impact","f":"Annual","dis":"Geography; Forest type","fw":"SDG","src":"Admin Records; Routine Monitoring","tools":"Global Forest Watch (Hansen/UMD); FAO FRA; UNFCCC REDD+; Collect Earth/Open Foris","notes":"SDG 15.1.1. Remote sensing + ground-truthing. Distinguish deforestation, degradation, regeneration.","rec":false},{"id":"CLI17","s":"Climate & Environment","sub":"Environmental Health","n":"Air quality (PM2.5 concentration)","d":"Annual mean concentration of fine particulate matter (PM2.5) in urban areas (μg/m³).","num":"Annual mean PM2.5","den":"N/A","u":"μg/m³","l":"Impact","f":"Annual","dis":"Geography; Urban/Rural","fw":"WHO; SDG","src":"Admin Records; Sentinel Surveillance","tools":"SDG 11.6.2 methodology; WHO Air Quality Database; Ground-level PM2.5 monitoring stations; Satellite-derived PM2.5 estimates (van Donkelaar methodology); WHO Air Quality Guidelines (2021): 5 μg/m³ annual mean","notes":"SDG 11.6.2. WHO 2021 guideline: 5 μg/m³ annual mean (tightened from 10). 99% of global population breathes air exceeding WHO guidelines. 4.2 million deaths annually from ambient air pollution.","rec":false},{"id":"CLI03","s":"Climate & Environment","sub":"Mitigation","n":"GHG emissions reduced/avoided","d":"Tonnes of CO2e reduced or avoided from programme activities","num":"Estimated tCO2e reduced","den":"N/A","u":"tCO2e","l":"Outcome","f":"Annual","dis":"Geography","fw":"GCF/AF","src":"Routine Monitoring; Admin Records","tools":"GCF Indicator M1.0; UNFCCC CDM methodologies; Gold Standard; IPCC Emission Factor Database","notes":"Requires robust counterfactual. GCF: ex-ante and ex-post calculation.","rec":false},{"id":"CLI04","s":"Climate & Environment","sub":"Mitigation","n":"Renewable energy capacity installed","d":"Megawatts of renewable energy capacity installed by programme interventions","num":"MW renewable installed","den":"N/A","u":"MW","l":"Output","f":"Annual","dis":"Energy source; Geography","fw":"GCF/AF; SDG","src":"Admin Records","tools":"GCF Indicator M4.0; IRENA Renewable Energy Statistics; SDG 7.b.1 methodology","notes":"Disaggregate by source: solar, wind, hydro, geothermal, biomass.","rec":false},{"id":"CLI05","s":"Climate & Environment","sub":"Mitigation","n":"Climate finance mobilized","d":"Total climate finance (adaptation + mitigation) mobilized","num":"Climate finance committed/disbursed (USD)","den":"N/A","u":"USD","l":"Output","f":"Annual","dis":"Adaptation vs. mitigation; Source","fw":"GCF/AF; SDG","src":"Admin Records","tools":"OECD DAC Rio Markers; GCF/AF financial reporting; National Climate Finance Tracking; CPI methodology","notes":"Compare pledged vs. committed vs. disbursed. Additionality is key challenge.","rec":false},{"id":"CLI11","s":"Climate & Environment","sub":"Mitigation","n":"Renewable energy generated (GCF M2.0)","d":"Megawatt-hours of renewable energy generated by programme-supported installations per year.","num":"MWh RE generated per year","den":"N/A","u":"MWh/year","l":"Outcome","f":"Annual","dis":"Energy source; Geography","fw":"GCF/AF","src":"Admin Records; Routine Monitoring","tools":"GCF Results Measurement Framework: Indicator M2.0; Generation meter readings; RE installation monitoring log; IRENA capacity factor methodology","notes":"Track alongside installed capacity (MW) and capacity factor (actual generation / theoretical maximum). Disaggregate by source: solar PV, wind, micro-hydro, biomass, geothermal.","rec":false},{"id":"EDU01","s":"Education","sub":"Access & Enrollment","n":"Net enrolment rate (primary)","d":"Percentage of primary-age children enrolled in primary education","num":"Primary-age children enrolled in primary","den":"Population of primary school age","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Geography; Urban/Rural; Wealth Quintile; Disability","fw":"GPE; SDG","src":"Admin Records; Household Survey","tools":"EMIS annual census; DHS-8: hv121-hv124; MICS6: ED1-ED9; UIS guidelines; Washington Group SS","notes":"Distinguish from GER. Gender Parity Index is key equity metric.","rec":true},{"id":"EDU02","s":"Education","sub":"Access & Enrollment","n":"Out-of-school children rate","d":"Percentage of school-age children not enrolled","num":"School-age children not enrolled","den":"Population of school age","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Geography; Wealth Quintile; Disability","fw":"GPE; SDG","src":"Household Survey; Admin Records","tools":"UNICEF/UIS OOSCI methodology; DHS/MICS education modules; EMIS; Washington Group SS","notes":"Disaggregate by reason. SDG 4.1 linked.","rec":false},{"id":"EDU03","s":"Education","sub":"Access & Enrollment","n":"Primary completion rate","d":"Percentage completing primary education","num":"New entrants to last primary grade","den":"Population of graduation age","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"GPE; SDG","src":"Admin Records; Household Survey","tools":"EMIS grade data; UIS Gross Intake Ratio methodology; DHS/MICS attainment questions","notes":"Can exceed 100% due to repeaters/late entrants. Proxy for system efficiency.","rec":false},{"id":"EDU04","s":"Education","sub":"Access & Enrollment","n":"Transition rate (primary to secondary)","d":"Percentage of final primary students entering secondary","num":"New entrants to secondary G1","den":"Students in final primary (prior year)","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"GPE; SDG","src":"Admin Records","tools":"EMIS enrolment by grade/level; UIS transition methodology; DHS/MICS education module","notes":"Key bottleneck indicator. Barriers: exam failure, fees, distance, cultural norms (especially girls).","rec":false},{"id":"EDU15","s":"Education","sub":"Access & Enrollment","n":"Education in Emergencies: crisis-affected children accessing education","d":"Percentage of crisis-affected school-age children enrolled in education","num":"Crisis-affected children enrolled","den":"Total crisis-affected school-age children","u":"%","l":"Output","f":"Annual","dis":"Sex; Age; Geography; Disability","fw":"INEE Minimum Standards","src":"Admin Records; Household Survey","tools":"INEE MS (2024): Standard 2 (Access), Standard 3 (Learning Environment); EMIS emergency data; Cluster 4W reporting","notes":"INEE Minimum Standards. Track temporary learning spaces, teacher-pupil ratios in emergency, PSS provision.","rec":false},{"id":"EDU16","s":"Education","sub":"Access & Enrollment","n":"Organised learning participation 1 year before primary (SDG 4.2.2)","d":"Percentage of children of the specified age who are participating in organised learning programmes 1 year before official primary entry age.","num":"Children in organised learning 1 year before primary","den":"Children of designated age","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"SDG; GPE","src":"Admin Records; Household Survey","tools":"EMIS: pre-primary enrolment data; DHS/MICS education module; UIS SDG 4.2.2 methodology","notes":"SDG 4.2.2. School readiness indicator. Critical for learning outcomes at primary level. Large equity gaps (urban/rural, wealth).","rec":false},{"id":"EDU17","s":"Education","sub":"Access & Enrollment","n":"School dropout rate","d":"Percentage of students enrolled at the beginning of the school year who are no longer enrolled at the end of the year (or did not progress to the next grade).","num":"Students dropping out during school year","den":"Students enrolled at start of year","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Grade; Geography; Wealth Quintile","fw":"SDG; GPE","src":"Admin Records","tools":"EMIS: beginning and end-of-year enrolment data; Cohort flow analysis; DHS/MICS education attainment progression","notes":"Distinct from out-of-school rate (stock) — dropout is a flow. Track by grade for bottleneck identification. Transition points (primary→secondary) are highest-risk.","rec":false},{"id":"EDU18","s":"Education","sub":"Access & Enrollment","n":"Grade repetition rate","d":"Percentage of students who are enrolled in the same grade as the previous year.","num":"Students repeating grade","den":"Total enrolled students","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Grade; Geography","fw":"GPE","src":"Admin Records","tools":"EMIS: repeater data by grade; UIS grade repetition methodology","notes":"High repetition wastes resources and predicts dropout. WHO Global Standards recommend maximum 10%. Automatic promotion policies reduce repetition but may mask learning gaps.","rec":false},{"id":"EDU19","s":"Education","sub":"Access & Enrollment","n":"Adult literacy rate","d":"Percentage of population aged 15+ who can read and write a simple statement.","num":"Literate adults 15+","den":"Adults 15+","u":"%","l":"Impact","f":"5-10 years","dis":"Sex; Age; Geography; Urban/Rural","fw":"SDG","src":"Household Survey; Admin Records","tools":"UIS literacy statistics; DHS/MICS literacy module (reading test); National census literacy question; SDG 4.6.1 methodology","notes":"SDG 4.6.1. Self-reported vs. directly tested approaches yield different results. DHS includes a reading test. Functional literacy (ability to use literacy in daily life) is increasingly preferred but harder to measure.","rec":false},{"id":"EDU23","s":"Education","sub":"Access & Enrollment","n":"INEE: Teacher PSS training in emergencies","d":"Percentage of teachers in crisis-affected areas who have received training in psychosocial support (PSS) and social-emotional learning (SEL).","num":"Teachers trained in PSS/SEL","den":"Total teachers in crisis-affected areas","u":"%","l":"Output","f":"Annual","dis":"Sex; Geography","fw":"INEE Minimum Standards","src":"Admin Records; Routine Monitoring","tools":"INEE Minimum Standards: Standard 12 (Teaching & Learning Processes); Education Cluster 4W reporting: teacher training data; PSS training participant register; MHPSS Minimum Service Package: school-based component","notes":"INEE Standard 12. Teachers are frontline PSS providers in emergencies. Minimum 3-day PSS training recommended. Track alongside student wellbeing/psychosocial assessment.","rec":false},{"id":"EDU12","s":"Education","sub":"Equity","n":"Gender parity index (GPI)","d":"Ratio of female to male enrolment/completion rates","num":"Female rate","den":"Male rate","u":"ratio","l":"Outcome","f":"Annual","dis":"Geography; Education level","fw":"GPE; SDG","src":"Admin Records; DHS","tools":"EMIS; DHS/MICS; UIS GPI methodology","notes":"GPI=1.0 parity. <0.97 female disadvantage. >1.03 male disadvantage.","rec":false},{"id":"EDU13","s":"Education","sub":"Equity","n":"School-related GBV prevalence","d":"Percentage of students reporting physical/sexual/psychological violence at school","num":"Students reporting SRGBV","den":"Total students surveyed","u":"%","l":"Impact","f":"2-3 years","dis":"Sex; Age; Geography; Violence type","fw":"GPE; SDG","src":"Household Survey","tools":"UNESCO SRGBV framework; VACS school module; GSHS violence section; UNGEI toolkit","notes":"SDG 4.a linked. Drives dropout. Ethics mandatory: informed consent, referrals.","rec":false},{"id":"EDU21","s":"Education","sub":"Equity","n":"Youth NEET rate (not in education, employment, or training)","d":"Proportion of youth (15-24) not in education, employment, or training.","num":"Youth 15-24 who are NEET","den":"Total youth 15-24","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Geography; Education level","fw":"SDG","src":"Household Survey; Admin Records","tools":"ILO methodology for SDG 8.6.1; Labour Force Survey: NEET calculation; DHS/MICS education and work modules","notes":"SDG 8.6.1. Cross-cutting education-employment indicator. High NEET rates signal failed school-to-work transitions. Gender disparities significant (female NEET rates higher due to unpaid care work). Also relevant for P/CVE (unemployment as push factor).","rec":false},{"id":"EDU05","s":"Education","sub":"Learning Outcomes","n":"Foundational reading proficiency (Grade 2/3)","d":"Percentage of children achieving minimum proficiency in reading at grade level","num":"Students meeting proficiency benchmark","den":"Students assessed","u":"%","l":"Impact","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"GPE; SDG","src":"Admin Records; Household Survey","tools":"EGRA (RTI/USAID): letter/syllable/word/passage reading + comprehension; ASER tool; PASEC","notes":"SDG 4.1.1. EGRA most widely used. Oral reading fluency = core subtask.","rec":true},{"id":"EDU06","s":"Education","sub":"Learning Outcomes","n":"Foundational numeracy proficiency (Grade 2/3)","d":"Percentage achieving minimum proficiency in mathematics","num":"Students meeting numeracy benchmark","den":"Students assessed","u":"%","l":"Impact","f":"Annual","dis":"Sex; Geography; Wealth Quintile","fw":"GPE; SDG","src":"Admin Records; Household Survey","tools":"EGMA (RTI/USAID): number ID, quantity discrimination, missing number, addition, subtraction, word problems; ASER math; PASEC","notes":"SDG 4.1.1. Administered alongside EGRA. ASER simpler pass/fail.","rec":false},{"id":"EDU07","s":"Education","sub":"Learning Outcomes","n":"Learning Poverty","d":"Percentage of 10-year-olds unable to read and understand a simple text","num":"10-year-olds below minimum reading proficiency","den":"All 10-year-olds (including out-of-school)","u":"%","l":"Impact","f":"Annual","dis":"Sex; Geography","fw":"World Bank/UIS","src":"Admin Records; Household Survey","tools":"World Bank/UIS Learning Poverty methodology (combines learning assessment + schooling)","notes":"Estimated 70% post-COVID in LMICs. Headline World Bank education indicator.","rec":false},{"id":"EDU08","s":"Education","sub":"Quality","n":"Pupil-teacher ratio","d":"Average number of pupils per teacher","num":"Total enrolled students","den":"Total teachers","u":"ratio","l":"Process","f":"Annual","dis":"Geography; Urban/Rural; Education level","fw":"GPE; SDG","src":"Admin Records","tools":"EMIS census data; UIS PTR guidelines; SDI teacher module","notes":"UNESCO benchmark <=40:1 primary. Combine with teacher qualification data.","rec":false},{"id":"EDU09","s":"Education","sub":"Quality","n":"Teacher classroom practice quality (TEACH)","d":"Score on structured observation of teacher practices","num":"Mean TEACH score across 3 areas, 9 elements","den":"N/A (composite)","u":"score (1-5)","l":"Process","f":"Annual","dis":"Geography; Education level","fw":"GPE; World Bank","src":"Facility Assessment","tools":"TEACH (World Bank, 28 elements, 3 areas: culture, instruction, socioemotional); Stallings Classroom Snapshot; TIPPS","notes":"TEACH is World Bank standard. 2 observations per teacher minimum. Training required.","rec":false},{"id":"EDU10","s":"Education","sub":"Quality","n":"Teacher absenteeism rate","d":"Percentage of expected days where teachers absent (unannounced visits)","num":"Teacher-days absent","den":"Expected teacher-days","u":"%","l":"Process","f":"Annual","dis":"Geography; Urban/Rural","fw":"GPE","src":"Facility Assessment","tools":"World Bank SDI teacher absenteeism module; Stallings time-on-task; EMIS digital attendance","notes":"SDI methodology. Rates 15-25% common. Distinguish school absence from classroom absence.","rec":false},{"id":"EDU11","s":"Education","sub":"Quality","n":"Government education expenditure as % GDP","d":"Total public education expenditure as share of GDP","num":"Government education expenditure","den":"GDP","u":"%","l":"Process","f":"Annual","dis":"Geography","fw":"GPE; SDG","src":"Admin Records","tools":"UIS finance indicators; National Education Accounts; World Bank PER for education","notes":"GPE benchmark: 4-6% GDP. Also track as % of total government expenditure (target 15-20%).","rec":false},{"id":"EDU14","s":"Education","sub":"Quality","n":"Early childhood development index (ECDI2030)","d":"Percentage of children 24-59 months developmentally on track","num":"Children on track","den":"Children 24-59 months assessed","u":"%","l":"Outcome","f":"Annual","dis":"Sex; Wealth Quintile; Urban/Rural","fw":"SDG","src":"MICS; Household Survey","tools":"ECDI2030 (revised UNICEF, for SDG 4.2.1); IDELA (Save the Children); MELQO (MODEL + MELE)","notes":"SDG 4.2.1. ECDI2030 covers health, learning, psychosocial wellbeing.","rec":false},{"id":"EDU20","s":"Education","sub":"Quality","n":"Teachers with minimum qualifications (SDG 4.c.1)","d":"Proportion of teachers who have received at least the minimum organised teacher training required for teaching at the relevant level.","num":"Teachers with minimum qualifications","den":"Total teachers","u":"%","l":"Process","f":"Annual","dis":"Sex; Geography; Education level","fw":"SDG; GPE","src":"Admin Records","tools":"EMIS: teacher qualification database; UIS SDG 4.c.1 methodology; World Bank SDI teacher qualification module","notes":"SDG 4.c.1. Distinct from pupil-teacher ratio. \"Minimum qualifications\" varies by country. Track alongside teacher knowledge scores (SDI clinical vignette equivalent) for full quality picture.","rec":false},{"id":"EDU22","s":"Education","sub":"Quality","n":"Schools with basic infrastructure (SDG 4.a.1 components)","d":"Proportion of schools with (a) electricity, (b) internet, (c) computers, (d) adapted infrastructure for students with disabilities.","num":"Schools with each infrastructure element","den":"Total schools","u":"% per element","l":"Output","f":"Annual","dis":"Geography; Urban/Rural; Education level","fw":"SDG; GPE","src":"Admin Records; Facility Assessment","tools":"EMIS: infrastructure module; SDG 4.a.1 methodology: 4 sub-indicators; UIS School Environment Survey; School facility assessment checklist","notes":"SDG 4.a.1. Report each element separately: (a) electricity 87% globally but <25% in many LICs, (b) internet <20% in LICs, (c) computers <15% in LICs, (d) disability-adapted infrastructure <25% globally.","rec":false},{"id":"WSH06","s":"WASH","sub":"Hygiene","n":"Handwashing facility with soap and water","d":"Percentage with handwashing facility with soap and water observed","num":"Population with facility (observed)","den":"Total surveyed","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"DHS; MICS","tools":"DHS-8: hv230-hv232; MICS6: HW1-HW4; JMP hygiene ladder","notes":"SDG 6.2.1b. Observation-based (not self-reported). Critical for disease prevention.","rec":false},{"id":"WSH07","s":"WASH","sub":"Hygiene","n":"Menstrual hygiene management","d":"Percentage of women/girls using clean material with access to private washing/disposal","num":"Women/girls meeting MHM criteria","den":"Women/girls of menstrual age","u":"%","l":"Outcome","f":"Annual","dis":"Age; Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"Household Survey","tools":"UNICEF MHM Module for MICS; JMP MHM Supplementary Module; WaterAid MHM Tool; PMA MHM module; WHO/UNICEF MHM Guidance","notes":"Cross-cutting: WASH, gender, education, health. Linked to school absenteeism. Measurement evolving.","rec":false},{"id":"WSH04","s":"WASH","sub":"Sanitation","n":"Safely managed sanitation","d":"Percentage using improved facility, not shared, excreta safely disposed/treated","num":"Population meeting criteria","den":"Total population","u":"%","l":"Impact","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"DHS; MICS; Household Survey","tools":"DHS-8: hv205/hv225; MICS6: WS8-WS11; JMP sanitation ladder; Sanitary inspection form (WHO)","notes":"SDG 6.2.1. \"Safely managed\" requires excreta management info beyond facility type.","rec":true},{"id":"WSH05","s":"WASH","sub":"Sanitation","n":"Open defecation prevalence","d":"Percentage practicing open defecation","num":"Population practicing OD","den":"Total population","u":"%","l":"Impact","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"DHS; MICS; Household Survey","tools":"DHS-8: hv205 code 31; MICS6: WS8; JMP bottom rung; CLTS ODF verification protocol","notes":"ODF = community-level indicator. CLTS methodology. Verification at 6/12/24 months.","rec":false},{"id":"WSH12","s":"WASH","sub":"Sanitation","n":"Basic sanitation service (JMP)","d":"Percentage of population using an improved sanitation facility that is not shared with other households.","num":"Population using improved, not shared facility","den":"Total population","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"DHS; MICS; Household Survey","tools":"DHS-8: hv205 (facility type) + hv225 (shared); MICS6: WS8-WS10; JMP service ladder: Basic rung","notes":"JMP ladder rung below \"Safely managed.\" Does NOT include excreta management requirement. Basic = improved facility + not shared.","rec":false},{"id":"WSH16","s":"WASH","sub":"Sanitation","n":"Faecal sludge management (safely managed chain)","d":"Percentage of on-site sanitation systems (septic tanks, pit latrines) where faecal sludge is safely contained, emptied, transported, treated, and disposed of or reused.","num":"On-site systems with safe FSM","den":"Total on-site sanitation systems","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography","fw":"SDG; UNICEF WASH","src":"Admin Records; Household Survey","tools":"JMP Safely Managed Sanitation: FSM component (containment + emptying + transport + treatment); SFD (Shit Flow Diagram) methodology: city-level sanitation flow analysis; National FSM monitoring framework","notes":"The \"missing middle\" of sanitation. Most urban sanitation in LMICs is on-site but FSM chain is broken. SFD methodology visualises the entire flow. Track each chain step separately: containment, emptying, transport, treatment, disposal/reuse.","rec":false},{"id":"WSH17","s":"WASH","sub":"Sanitation","n":"ODF sustainability (verification at 12/24 months)","d":"Percentage of communities declared ODF that maintain ODF status at 12 and 24 months post-declaration.","num":"Communities maintaining ODF at 12/24 months","den":"Communities declared ODF","u":"%","l":"Impact","f":"Annual","dis":"Geography","fw":"UNICEF WASH","src":"Admin Records; Routine Monitoring","tools":"CLTS ODF verification protocol (at declaration); ODF sustainability monitoring tool (at 12/24 months); Community-level spot check: latrine functionality, signs of OD, handwashing stations; Sanitation ladder progression tracking","notes":"Slippage rates of 10-30% common. Sustainability depends on: latrine durability, soil conditions, water table, community governance, follow-up support. Track both ODF maintenance AND movement up the sanitation ladder (improved latrine technology adoption).","rec":false},{"id":"WSH08","s":"WASH","sub":"WASH in HCF","n":"Basic WASH in health care facilities","d":"Percentage of HCFs with basic water, sanitation, and hygiene","num":"HCFs meeting all 3 criteria","den":"Total HCFs assessed","u":"%","l":"Output","f":"Annual","dis":"Geography; Urban/Rural; Facility level","fw":"SDG; UNICEF WASH; WHO 100 Core","src":"Facility Assessment; DHIS2/HMIS","tools":"JMP WASH in HCF Core Indicators; WASH FIT (95 indicators, 5+2+2 domains); WHO SARA Module 1; WHO HHFA WASH module","notes":"JMP monitors separately: water, sanitation, hygiene, waste, cleaning. Report each + composite.","rec":false},{"id":"WSH19","s":"WASH","sub":"WASH in HCF","n":"WASH FIT comprehensive score","d":"Percentage of WASH FIT indicators met across all domains (water, sanitation, waste, cleaning, hand hygiene, energy, management) at health facility level.","num":"WASH FIT indicators met","den":"Total WASH FIT indicators assessed","u":"%","l":"Process","f":"Annual","dis":"Geography; Facility level; Domain","fw":"WHO 100 Core; UNICEF WASH","src":"Facility Assessment","tools":"WASH FIT Tool (2nd edition, 2022): 95 indicators across 5 primary + 2 supporting + 2 cross-cutting domains; Self-assessment format; Improvement planning template; WHO/UNICEF WASH in HCF monitoring framework","notes":"95 indicators scored: meets/partially meets/does not meet. Report overall % and per-domain. WASH FIT includes improvement planning cycle (assess → risk-prioritise → improve → monitor). Climate resilience and gender/disability inclusion added in 2nd edition.","rec":false},{"id":"WSH09","s":"WASH","sub":"WASH in Schools","n":"Basic WASH services in schools","d":"Percentage of schools with basic drinking water, sanitation (single-sex), and hygiene (soap)","num":"Schools meeting all 3 criteria","den":"Total schools assessed","u":"%","l":"Output","f":"Annual","dis":"Geography; Urban/Rural; School level","fw":"SDG; UNICEF WASH","src":"Admin Records; Facility Assessment","tools":"JMP WASH in Schools Core Questions; EMIS WASH module; UNICEF Three-Star Approach; SDG 4.a.1","notes":"SDG 4.a.1. Gender-disaggregated sanitation critical. PTL ratio complementary (<=25:1 girls).","rec":false},{"id":"WSH10","s":"WASH","sub":"Water Quality","n":"E. coli at point of use","d":"Percentage of HH water samples positive for E. coli (>1 CFU/100ml)","num":"Samples positive","den":"Total samples tested","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography; Source type","fw":"SDG; UNICEF WASH","src":"Household Survey","tools":"Compartment Bag Test (Aquagenx); Membrane filtration; MICS Water Quality Module; WHO GDWQ (4th ed); DHS WQ module","notes":"WHO: 0 CFU/100ml. Point-of-use often worse than source. Risk categories: <1, 1-10, 11-100, >100.","rec":false},{"id":"WSH15","s":"WASH","sub":"Water Quality","n":"Residual chlorine at point of delivery","d":"Percentage of water samples from distribution systems with free residual chlorine >=0.2 mg/L.","num":"Samples with FRC >=0.2 mg/L","den":"Total samples tested","u":"%","l":"Process","f":"Monthly","dis":"Geography; Urban/Rural","fw":"WHO; SPHERE; UNICEF WASH","src":"Admin Records; Routine Monitoring","tools":"Pool tester / DPD colorimetric method; Digital chlorine meter; WHO GDWQ: chlorine standards (0.2-0.5 mg/L FRC at point of delivery, <5 mg/L); SPHERE water treatment standards","notes":"WHO/SPHERE minimum 0.2 mg/L FRC at point of delivery. In turbid water, higher doses needed but FRC at tap <=0.5 mg/L to avoid taste issues. Track at source, distribution, and household level.","rec":false},{"id":"WSH01","s":"WASH","sub":"Water Supply","n":"Safely managed drinking water","d":"Percentage using improved source, on premises, available when needed, free from contamination","num":"Population meeting all 3 criteria","den":"Total population","u":"%","l":"Impact","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"DHS; MICS; Household Survey","tools":"DHS-8: hv201/hv204/hv237; MICS6: WS1-WS7; JMP service ladder; E. coli field test kits","notes":"SDG 6.1.1. \"Safely managed\" requires water quality testing. JMP ladder: safely managed → basic → limited → unimproved → surface.","rec":true},{"id":"WSH02","s":"WASH","sub":"Water Supply","n":"Water quantity (litres/person/day)","d":"Average water collected per person per day for domestic use","num":"Total litres collected per HH/day","den":"HH size","u":"l/p/d","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SPHERE; UNICEF WASH","src":"Household Survey","tools":"SPHERE Standards (>=15 l/p/d survival, >=20 medium-term); KAP water module; JMP Water Quantity Module; Container counting method","notes":"WHO recommends >=50 l/p/d. Container counting most practical measurement.","rec":false},{"id":"WSH03","s":"WASH","sub":"Water Supply","n":"Water point functionality rate","d":"Percentage of improved water points functional at time of assessment","num":"Functional water points","den":"Total improved water points","u":"%","l":"Output","f":"Annual","dis":"Geography; Urban/Rural; Type","fw":"UNICEF WASH","src":"Admin Records; Facility Assessment","tools":"National water point mapping (mWater, WPDx, Akvo Flow); WPDx data collection form; Sustainability assessment tool","notes":"60-80% typical in rural SSA. Track alongside repair time and water committee functionality.","rec":false},{"id":"WSH11","s":"WASH","sub":"Water Supply","n":"Basic drinking water service (JMP)","d":"Percentage of population using an improved drinking water source with collection time <=30 minutes round trip.","num":"Population using improved source <=30 min","den":"Total population","u":"%","l":"Outcome","f":"Annual","dis":"Urban/Rural; Geography; Wealth Quintile","fw":"SDG; UNICEF WASH","src":"DHS; MICS; Household Survey","tools":"DHS-8: hv201 (source type) + hv204 (time to source); MICS6: WS1-WS4; JMP service ladder: Basic rung","notes":"JMP ladder rung below \"Safely managed.\" Does NOT include water quality testing or on-premises requirement. Basic = improved source + <=30 min round trip.","rec":false},{"id":"WSH13","s":"WASH","sub":"Water Supply","n":"Water service continuity (hours per day)","d":"Average hours of piped water supply available per day in urban areas.","num":"Hours of water supply per day (average)","den":"N/A","u":"hours/day","l":"Process","f":"Quarterly","dis":"Urban/Rural; Geography","fw":"SDG; UNICEF WASH","src":"Admin Records; Household Survey","tools":"Utility performance monitoring: supply hours per zone; IBNET (International Benchmarking Network) water utility indicators; JMP supplementary indicators; Household survey: water availability questions","notes":"Continuous supply = 24 hours/day. Many LMICs have intermittent supply (2-8 hours/day). Intermittent supply increases contamination risk and inequity. Track alongside NRW (non-revenue water/system losses).","rec":false},{"id":"WSH14","s":"WASH","sub":"Water Supply","n":"Water affordability","d":"Percentage of household income spent on obtaining minimum water supply.","num":"Water expenditure","den":"Household income/consumption","u":"%","l":"Outcome","f":"Annual","dis":"Wealth Quintile; Urban/Rural; Geography","fw":"SPHERE; SDG","src":"Household Survey","tools":"SPHERE Standard: water cost <=3-5% of household income; JMP affordability supplementary indicator; Household expenditure survey: water cost module; Utility tariff analysis","notes":"SPHERE: <=3-5% of income. UNDP suggests 3%. WASH affordability index. Poorest quintile often pays highest unit price (vendor water vs. piped). Track alongside time to collect water (opportunity cost).","rec":false},{"id":"WSH18","s":"WASH","sub":"Water Supply","n":"SPHERE water quantity standard compliance","d":"Percentage of population receiving minimum 15 litres per person per day of safe water.","num":"Population receiving >=15 l/p/d","den":"Affected population","u":"%","l":"Output","f":"Monthly","dis":"Geography; Population group","fw":"SPHERE","src":"Routine Monitoring","tools":"SPHERE Minimum Standard 1 (Water Supply): >=15 l/p/d (survival), >=20 l/p/d (medium-term); Water distribution monitoring: flow rates, tanker/trucking logs; Water point usage monitoring; Container distribution tracking","notes":"Emergency standard. 15 l/p/d = survival minimum. 20 l/p/d = medium-term. 40-60 l/p/d = full domestic needs. Track alongside max distance (500m), queue time (<=15min), and fill time (<=3min for 20L).","rec":false},{"id":"CC02","s":"Cross-Cutting","sub":"Accountability","n":"Community feedback mechanism awareness","d":"Percentage of beneficiaries aware of and able to access community feedback/complaint mechanisms","num":"Beneficiaries aware of CFM","den":"Total beneficiaries surveyed","u":"%","l":"Process","f":"Quarterly","dis":"Sex; Age; Geography","fw":"Humanitarian Standards","src":"Routine Monitoring","tools":"CHS AAP monitoring checklist; IASC AAP framework; Community perception survey; Beneficiary feedback register","notes":"Required across all humanitarian sectors. Track awareness AND utilisation AND satisfaction with response.","rec":false},{"id":"CC06","s":"Cross-Cutting","sub":"Accountability","n":"Beneficiary satisfaction with programme","d":"Percentage of direct beneficiaries reporting satisfaction with programme quality, relevance, and accessibility.","num":"Beneficiaries satisfied/very satisfied","den":"Total beneficiaries surveyed","u":"%","l":"Outcome","f":"Quarterly","dis":"Sex; Age; Geography; Programme component","fw":"Humanitarian Standards; FCDO","src":"Routine Monitoring; Household Survey","tools":"CHS AAP monitoring: satisfaction questions; Beneficiary perception survey; Programme exit interview; Client satisfaction scorecard; Community scorecard methodology","notes":"Track alongside CFM utilisation and complaint resolution rates. Disaggregate by specific programme components. Use mixed methods: quantitative satisfaction scores + qualitative open-ended feedback.","rec":false},{"id":"CC04","s":"Cross-Cutting","sub":"Data Quality","n":"Data use for decision-making","d":"Percentage of district health teams that used HMIS data for quarterly planning in past year","num":"Districts using data for planning","den":"Total districts","u":"%","l":"Process","f":"Annual","dis":"Geography","fw":"Global Fund; WHO 100 Core","src":"Admin Records","tools":"PRISM (Performance of Routine Information System Management) Assessment: data use module; WHO DQR Module 3; DHIS2 dashboard usage analytics","notes":"Assessed via document review (do quarterly plans reference data?) and key informant interviews.","rec":false},{"id":"CC08","s":"Cross-Cutting","sub":"Data Quality","n":"Data quality composite index","d":"Composite score of data quality across 4 dimensions: completeness, timeliness, accuracy, and internal consistency.","num":"Weighted score across 4 dimensions","den":"N/A (index 0-100)","u":"index","l":"Process","f":"Annual","dis":"Geography","fw":"WHO 100 Core; Global Fund","src":"DHIS2/HMIS","tools":"WHO DQR Toolkit: 4 modules (Completeness & Timeliness, Internal Consistency, External Consistency, Data Use); Global Fund RDQA Tool; Gavi DQS; DHIS2 Data Quality App; PRAXIS DQI Planner dependency chain","notes":"Composite of: (1) reporting completeness >90%, (2) timeliness >80%, (3) verification factor 0.95-1.05, (4) internal consistency checks pass. Track per indicator and per facility. Links to PRAXIS DQI Planner tool.","rec":true},{"id":"CC09","s":"Cross-Cutting","sub":"Data Quality","n":"Data use for decision-making","d":"Percentage of district health/programme teams that used routine data for quarterly or annual planning and resource allocation.","num":"Districts using data for planning","den":"Total districts","u":"%","l":"Outcome","f":"Annual","dis":"Geography","fw":"WHO 100 Core; Global Fund","src":"Admin Records","tools":"PRISM (Performance of Routine Information System Management): data use module; WHO DQR Module 3 (Data Use); DHIS2 dashboard usage analytics; Document review: do quarterly plans reference data?","notes":"Assessed via: document review (meeting minutes, plans referencing data), key informant interviews, DHIS2 analytics log review. \"Data use culture\" is the ultimate HMIS strengthening outcome.","rec":false},{"id":"CC01","s":"Cross-Cutting","sub":"Disability Inclusion","n":"Disability prevalence (Washington Group)","d":"Percentage of population with functional difficulty in >=1 domain","num":"Adults with difficulty in >=1 domain","den":"Total adults surveyed","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Domain; Geography","fw":"EU; FCDO; SDG; USAID","src":"Household Survey","tools":"Washington Group Short Set (WG-SS, 6 questions: seeing, hearing, walking, remembering, self-care, communication); WG Extended Set (ES); WG Child Functioning Module","notes":"Required by USAID, FCDO, EU for disaggregation across all sectors. 6 domains with 4-level response scale.","rec":false},{"id":"CC05","s":"Cross-Cutting","sub":"Disability Inclusion","n":"Washington Group Extended Set","d":"Prevalence of functional difficulties across 6+ domains using the WG Extended Set of questions (adds upper body, pain, fatigue, anxiety, depression to short set).","num":"Adults/children with difficulty in >=1 domain","den":"Total surveyed","u":"%","l":"Impact","f":"Annual","dis":"Sex; Age; Domain; Geography","fw":"SDG; USAID; FCDO; EU","src":"Household Survey","tools":"Washington Group Extended Set (WG-ES): 6 short set domains + upper body, pain/fatigue, anxiety, depression, cognition; WG Child Functioning Module (CFM, 2-17 years); WG/UNICEF Module on Child Functioning","notes":"Extended set recommended when disability is a primary analysis variable. Child Functioning Module (WG/UNICEF CFM) for children 2-17. USAID/FCDO increasingly require WG-disaggregated reporting.","rec":false},{"id":"CC03","s":"Cross-Cutting","sub":"Value for Money","n":"Cost per beneficiary","d":"Total programme cost divided by number of direct beneficiaries reached","num":"Total programme expenditure","den":"Number of direct beneficiaries","u":"USD/beneficiary","l":"Process","f":"Annual","dis":"Programme type; Geography","fw":"EU; FCDO; USAID","src":"Admin Records","tools":"FCDO VfM Framework (4Es: Economy, Efficiency, Effectiveness, Equity); Unit cost tracking spreadsheet; Cost-efficiency analysis protocol","notes":"Compare to benchmarks. Combine with effectiveness data for cost-effectiveness ratios. Triangulate with budget execution rate.","rec":false},{"id":"CC07","s":"Cross-Cutting","sub":"Value for Money","n":"Cost-effectiveness ratio","d":"Cost per unit of outcome achieved (e.g., cost per DALY averted, cost per child reaching learning proficiency, cost per household food secure).","num":"Total programme cost","den":"Outcome units achieved","u":"USD per unit","l":"Impact","f":"Annual","dis":"Programme type; Geography","fw":"FCDO; WHO; Global Fund","src":"Admin Records","tools":"FCDO VfM Framework: Effectiveness component; WHO-CHOICE (Choosing Interventions that are Cost-Effective) database; Global Fund VfM Technical Brief; IHME Disease Control Priorities (DCP3): CEA methodology; Drummond et al. Methods for Economic Evaluation","notes":"FCDO 4E Framework: Economy (input costs), Efficiency (cost per output), Effectiveness (cost per outcome), Equity (distributional analysis). Compare to published CEA benchmarks. WHO-CHOICE provides country-specific cost-effectiveness thresholds.","rec":false},{"id":"CC10","s":"Cross-Cutting","sub":"Value for Money","n":"Budget execution rate","d":"Percentage of approved annual budget that was actually disbursed and spent within the fiscal year.","num":"Actual expenditure","den":"Approved budget","u":"%","l":"Process","f":"Annual","dis":"Budget category; Geography","fw":"Global Fund; FCDO; SDG","src":"Admin Records","tools":"Financial management system reports; Global Fund financial reporting templates; PEFA (Public Expenditure and Financial Accountability) assessment; SDG 16.6.1 methodology","notes":"SDG 16.6.1. Low execution (<70%) signals absorption capacity issues, procurement delays, or governance problems. Very high execution (>95%) may signal end-of-year rush spending. Disaggregate by category (personnel, procurement, capital) for diagnostic insight.","rec":false}];
</script>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef,memo}=React;

/* ── Constants ── */
const LEVELS=['Impact','Outcome','Output','Process'];
const LEVEL_COLORS={Impact:'#E85D5D',Outcome:'#2EC4B6',Output:'#E8A317',Process:'#8899AA'};
const SECTOR_COLORS={'Health Systems':'#4A9BD9','Disease Programmes':'#E85D5D','RMNCAH':'#D4699E','Immunisation':'#5BB98C','Nutrition':'#E8A317','Food Security':'#D4915E','P/CVE & Governance':'#9B6DD7','Climate & Environment':'#45B5AA','Education':'#6A9FD8','WASH':'#3CB4E5','Cross-Cutting':'#8899AA'};
const EVAL_TYPES=[
  {name:'Impact Evaluation',desc:'Measures causal attribution of outcomes to an intervention. Emphasises impact and outcome indicators.',levels:['Impact','Outcome']},
  {name:'Process Evaluation',desc:'Examines how the programme is implemented. Focuses on process and output indicators.',levels:['Process','Output']},
  {name:'Performance Monitoring',desc:'Tracks ongoing programme delivery against targets. Emphasises output and process indicators.',levels:['Output','Process']},
  {name:'Baseline / Endline',desc:'Establishes measurement framework across all levels for before-after comparison.',levels:['Impact','Outcome','Output','Process']},
  {name:'Real-time Monitoring',desc:'Rapid feedback loops during implementation. Focuses on output and process indicators.',levels:['Output','Process']},
  {name:'Value for Money',desc:'Assesses economy, efficiency, effectiveness, and equity. Uses indicators across all levels.',levels:['Impact','Outcome','Output','Process']}
];
const PER_PAGE=50;
const LS_KEY='praxis_indicator_bank_v1';

/* ── Helpers ── */
const splitField=(v)=>v?v.split('; ').map(s=>s.trim()).filter(Boolean):[];
const allSectors=[...new Set(DB.map(i=>i.s))].sort();
const allSubsectors=(sectors)=>{const subs={};DB.forEach(i=>{if(!sectors.length||sectors.includes(i.s)){if(!subs[i.s])subs[i.s]=new Set();subs[i.s].add(i.sub)}});return subs};
const allFrameworks=[...new Set(DB.flatMap(i=>splitField(i.fw)))].sort();
const allSources=[...new Set(DB.flatMap(i=>splitField(i.src)))].sort();
const allFrequencies=[...new Set(DB.map(i=>i.f))].sort();

function countBy(arr,key){const c={};arr.forEach(i=>{const v=typeof key==='function'?key(i):i[key];if(Array.isArray(v))v.forEach(x=>{c[x]=(c[x]||0)+1});else c[v]=(c[v]||0)+1});return c}
function highlightText(text,query){
  if(!query||!text)return text;
  const idx=text.toLowerCase().indexOf(query.toLowerCase());
  if(idx===-1)return text;
  return <>{text.slice(0,idx)}<mark>{text.slice(idx,idx+query.length)}</mark>{text.slice(idx+query.length)}</>;
}
function matchesSearch(ind,q){
  if(!q)return true;
  const lq=q.toLowerCase();
  return[ind.id,ind.n,ind.d,ind.sub,ind.s,ind.fw,ind.src,ind.tools,ind.notes,ind.num,ind.den,ind.dis].some(f=>f&&f.toLowerCase().includes(lq));
}
function generateCSV(headers,rows){
  const escape=v=>{const s=String(v||'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s};
  return[headers.map(escape).join(','),...rows.map(r=>r.map(escape).join(','))].join('\n');
}
function downloadCSV(filename,csv){
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
function saveState(state){try{localStorage.setItem(LS_KEY,JSON.stringify(state))}catch(e){}}
function loadState(){try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):null}catch(e){return null}}
function encodeShareLink(basket,goalText){
  const data={b:basket,g:goalText};
  return window.location.origin+window.location.pathname+'#fw='+btoa(JSON.stringify(data));
}
function decodeShareLink(){
  try{const h=window.location.hash;if(!h.startsWith('#fw='))return null;return JSON.parse(atob(h.slice(4)))}catch(e){return null}
}

/* ── SVG Icons (inline) ── */
const IconSearch=()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
const IconFilter=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;

const IconPlus=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

const IconCopy=()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>;
const IconDownload=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
const IconPrint=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
const IconLink=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>;
const IconDrag=()=><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>;
const IconTrash=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>;

/* ── TopBar ── */
function TopBar({activeTab,setActiveTab,basketCount}){
  return <div className="topbar">
    <a href="../" className="topbar-brand" style={{textDecoration:'none'}}><span>PRAXIS</span> / Indicator Bank</a>
    <div className="topbar-tabs">
      <button className={`topbar-tab${activeTab==='wizard'?' active':''}`} onClick={()=>setActiveTab('wizard')}>Selector</button>
      <button className={`topbar-tab${activeTab==='browse'?' active':''}`} onClick={()=>setActiveTab('browse')}>Browse</button>
      <button className={`topbar-tab${activeTab==='framework'?' active':''}`} onClick={()=>setActiveTab('framework')}>
        Framework{basketCount>0&&<span className="badge">{basketCount}</span>}
      </button>

/* ── Mobile Tab Bar ── */
function MobileTabBar({activeTab,setActiveTab,basketCount}){
  return <div className="mobile-tabs">
    <button className={`mobile-tab${activeTab==='wizard'?' active':''}`} onClick={()=>setActiveTab('wizard')}>
      <IconWand/><span>Selector</span>
    </button>
    <button className={`mobile-tab${activeTab==='browse'?' active':''}`} onClick={()=>setActiveTab('browse')}>
      <IconGrid/><span>Browse</span>
    </button>
